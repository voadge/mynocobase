<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤打卡</title>
    <link rel="stylesheet" href="/dashboard/assets/attend.css?v=18">
    <style>
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); }
        .attend-overlay { position: relative !important; display: flex !important; background: none !important; backdrop-filter: none !important; }
    </style>
</head>
<body>
<div class="attend-overlay show" id="attendOverlay">
    <div class="attend-drawer">
        <button class="attend-close" onclick="closeAttendModal()" title="关闭">&#10005;</button>
        <div class="attend-title-row">
            <h3>&#128248; 考勤打卡</h3>
            <span class="attend-time-display">&#128337; <span id="attendTime">--</span></span>
        </div>
        <div class="attend-type-tabs" id="attendTypeTabs">
            <div class="attend-type-tab selected" data-type="上班" onclick="onAttendTypeChange('上班',this)">&#128205; 上班</div>
            <div class="attend-type-tab" data-type="下班" onclick="onAttendTypeChange('下班',this)">&#127968; 下班</div>
            <div class="attend-type-tab" data-type="请假" onclick="onAttendTypeChange('请假',this)">&#128203; 请假</div>
            <div class="attend-type-tab" data-type="出差" onclick="onAttendTypeChange('出差',this)">&#128661; 出差</div>
        </div>
        <div id="attendNormalSection">
            <div class="attend-camera-wrap" id="cameraWrap">
                <video id="attendVideo" autoplay playsinline></video>
                <canvas id="attendCanvas"></canvas>
                <div class="face-indicator" id="faceIndicator"></div>
                <div class="face-status" id="faceStatus">&#128247; 请拍摄人脸</div>
                <button class="camera-switch-btn" id="cameraSwitchBtn" onclick="switchCamera()">&#128260;</button>
                <button class="camera-retry-btn" id="cameraRetryBtn" onclick="retryCamera()">&#128260;</button>
                <button class="attend-capture-btn" id="captureBtn" onclick="capturePhoto()">&#128247;</button>
            </div>
            <input type="file" id="cameraFileInput" accept="image/*" capture="environment" style="display:none">
            <div class="attend-finger-row">
                <span class="label">&#128272; 本机验证</span>
                <span class="attend-finger-status unavailable" id="fingerStatus">检测中...</span>
                <button class="attend-finger-btn" id="fingerBtn" disabled onclick="verifyFingerprint()">本机指纹</button>
            </div>
        </div>
        <div class="attend-leave-section" id="attendLeaveSection">
            <div class="date-row">
                <div class="date-field">
                    <label>开始日期</label>
                    <input type="date" id="leaveStartDate">
                </div>
                <div class="date-field">
                    <label>结束日期</label>
                    <input type="date" id="leaveEndDate">
                </div>
            </div>
            <textarea id="leaveReason" placeholder="请输入事由说明..."></textarea>
        </div>
        <div class="attend-leave-status" id="attendLeaveStatus"></div>
        <div class="attend-verify-bar" id="verifyBar" style="display:none">
            <div class="v-item" id="vGps">&#128205; 定位</div>
            <div class="v-item" id="vFence">&#128205; 围栏</div>
            <div class="v-item" id="vFace">&#128247; 人脸</div>
            <div class="v-item" id="vFinger">&#128272; 指纹</div>
        </div>
        <button class="attend-submit" id="attendSubmit" disabled onclick="submitAttendance()">确认打卡</button>
        <div class="attend-location-status getting" id="locationStatus" data-base="正在获取位置...">正在获取位置...</div>
        <div class="attend-manual-location" id="manualLocationSection" style="display:none;margin-top:6px">
            <input type="text" id="manualLocationInput" placeholder="输入位置描述或坐标" style="width:100%;padding:6px 10px;border-radius:6px;border:1px solid #334;background:#1a2332;color:#e0e6ed;font-size:0.85em">
            <button class="attend-manual-loc-btn" id="manualLocationBtn" onclick="confirmManualLocation()" style="margin-top:4px;padding:4px 12px;border-radius:6px;border:1px solid #00d4ff;background:transparent;color:#00d4ff;font-size:0.82em;cursor:pointer">&#10003; 确认位置</button>
        </div>
        <span id="attendLocation" style="display:none"></span>
    </div>
</div>
<div class="finger-confirm-overlay" id="fingerConfirmOverlay">
    <div class="finger-confirm-dialog">
        <p>是否使用本机设备完成验证？</p>
        <div class="device-id" id="fingerDeviceId">--</div>
        <div class="finger-confirm-btns">
            <button class="btn-confirm" onclick="confirmFingerprint(true)">确定</button>
            <button class="btn-cancel" onclick="confirmFingerprint(false)">取消</button>
        </div>
    </div>
</div>
<script src="/dashboard/assets/attend.js?v=7"></script>
<script>
// Override closeAttendModal for iframe context
window._closeAttendOriginal = window.closeAttendModal;
window.closeAttendModal = function() {
    stopCamera();
    clearInterval(window._attendTimer);
    try { if (window.parent) window.parent.closeDrawer(); } catch(e) {}
};
// Auto-open with optional type parameter
(function(){
    var p = new URLSearchParams(location.search);
    var t = p.get('type');
    setTimeout(function() { openAttendModal(t); }, 150);
})();
</script>
</body>
</html>
