<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州遵大数智化平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c1426 0%, #1a2332 50%, #0d1926 100%);
            color: #e0e6ed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 12px;
        }

        .logo-container { flex-shrink: 0; }

        .logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }

        .title-container { text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; }

        .header h1 {
            font-size: 1.9em; font-weight: 300; letter-spacing: 6px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .header .subtitle {
            color: #5a6a7a; font-size: 0.85em; margin-top: 6px; letter-spacing: 4px;
        }

        /* ---- 主舞台：大屏 + 左侧面板 ---- */
        .main-stage {
            width: 80%;
            margin: 2em auto 0;
            display: flex;
            gap: 14px;
            align-items: stretch;
        }

        /* 左侧面板：时间 + 待办 */
        .side-panel {
            flex: 0 0 195px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .side-panel .panel-card {
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.08), rgba(123, 44, 191, 0.03));
            border: 1px solid rgba(0, 212, 255, 0.18);
            border-radius: 12px;
            padding: 18px 16px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 时间模块 */
        .side-panel .clock-digits {
            font-size: 1.8em;
            font-family: 'Consolas', 'Courier New', monospace;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.6), 0 0 24px rgba(0, 212, 255, 0.2);
            letter-spacing: 3px;
            line-height: 1.3;
        }

        .clock-digits .colon { display: inline-block; animation: blink 1s step-end infinite; }

        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

        .side-panel .info-cycle {
            height: 1.5em; overflow: hidden; position: relative; width: 100%; margin-top: auto;
        }

        .side-panel .cycle-item {
            position: absolute; width: 100%; left: 0; top: 0; text-align: center;
            opacity: 0; transform: translateY(10px); transition: all 0.4s ease;
            font-size: 0.7em; letter-spacing: 2px;
        }

        .side-panel .cycle-item.active { opacity: 1; transform: translateY(0); }

        .cycle-item .label-date { color: #e0e6ed; }
        .cycle-item .label-lunar { color: #7b2cbf; }
        .cycle-item .label-term  { color: #ffd93d; }
        .cycle-item .label-week  { color: #5a6a7a; }
        .cycle-item .label-weather { color: #00ff88; }
        .cycle-item .label-temp   { color: #ff6b6b; }

        /* 待办模块 */
        .todo-inner {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-inner .todo-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .todo-inner .todo-icon {
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1em; flex-shrink: 0;
        }

        .todo-inner .todo-icon.pending { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }
        .todo-inner .todo-icon.notify  { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }

        .todo-inner .todo-info { flex: 1; }
        .todo-inner .todo-count {
            font-size: 1.6em; font-weight: 700; line-height: 1;
        }
        .todo-inner .todo-count.pending-count { color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        .todo-inner .todo-count.notify-count  { color: #ff6b6b; text-shadow: 0 0 10px rgba(255, 107, 107, 0.3); }
        .todo-inner .todo-label { font-size: 0.7em; color: #5a6a7a; margin-top: 1px; }

        /* 大屏 iframe */
        .stage-frame-wrap {
            flex: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.2);
            background: #0a0e1a;
            aspect-ratio: 16 / 10;
        }

        .stage-frame-wrap iframe {
            width: 100%; height: 100%; border: none; display: block;
        }

        /* ---- 工作版块 ---- */
        .work-section { margin-top: 28px; }

        .section-header {
            font-size: 1.1em; color: #00d4ff; margin-bottom: 16px;
            padding-bottom: 8px; border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            display: flex; align-items: center; gap: 10px;
        }

        .section-header::before {
            content: ''; width: 4px; height: 18px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf); border-radius: 2px;
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 12px;
        }

        .work-group {
            border-radius: 10px; padding: 12px 10px 10px; border: 1px solid;
        }

        .work-group .group-title {
            font-size: 0.82em; font-weight: 600; margin-bottom: 8px;
            padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .work-group .btn-list { display: flex; flex-direction: column; gap: 4px; }

        .work-group .btn-item {
            display: inline-block; padding: 4px 8px; border-radius: 4px;
            font-size: 0.72em; text-decoration: none; border: 1px solid;
            cursor: pointer; transition: all 0.2s;
        }

        .work-group .btn-item:hover { filter: brightness(1.2); transform: translateX(3px); }

        /* ---- 底部 ---- */
        .footer {
            margin-top: 30px; padding: 18px; text-align: center;
            color: #5a6a7a; font-size: 0.82em;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
        }
        .footer a { color: #00d4ff; text-decoration: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .side-panel .panel-card, .work-group {
            animation: fadeIn 0.5s ease forwards;
        }

        @media (max-width: 900px) {
            .main-stage { flex-direction: column; width: 100%; }
            .side-panel { flex: unset; flex-direction: row; width: 100%; }
            .side-panel .panel-card { flex: 1; }
            .works-grid { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; gap: 10px; }
            .header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div class="logo-container">
                <img src="assets/logo.png" alt="遵大Logo" class="logo">
            </div>
            <div class="title-container">
                <h1>贵州遵大数智化平台</h1>
                <div class="subtitle">以道树业 致诚德信</div>
            </div>
        </div>

        <!-- 主舞台：大屏 + 左侧面板 -->
        <div class="main-stage">
            <div class="side-panel">
                <div class="panel-card">
                    <div class="clock-digits">
                        <span id="clockHour">00</span>
                        <span class="colon">:</span>
                        <span id="clockMin">00</span>
                    </div>
                    <div class="info-cycle">
                        <span class="cycle-item active" id="dateDisplay"><span class="label-date"></span></span>
                        <span class="cycle-item" id="lunarDisplay"><span class="label-lunar"></span></span>
                        <span class="cycle-item" id="termDisplay"><span class="label-term"></span></span>
                        <span class="cycle-item" id="weekdayDisplay"><span class="label-week"></span></span>
                        <span class="cycle-item" id="weatherDisplay"><span class="label-weather"></span></span>
                        <span class="cycle-item" id="tempDisplay"><span class="label-temp"></span></span>
                    </div>
                </div>
                <div class="panel-card">
                    <div class="todo-inner">
                        <div class="todo-row">
                            <div class="todo-icon pending">📋</div>
                            <div class="todo-info">
                                <div class="todo-count pending-count" id="pendingCount">--</div>
                                <div class="todo-label">待办流程</div>
                            </div>
                        </div>
                        <div class="todo-row">
                            <div class="todo-icon notify">🔔</div>
                            <div class="todo-info">
                                <div class="todo-count notify-count" id="notifyCount">--</div>
                                <div class="todo-label">未读消息</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="stage-frame-wrap">
                <iframe id="externFrame" src="" allowfullscreen></iframe>
            </div>
        </div>

        <!-- 工作版块 -->
        <div class="work-section">
            <div class="section-header">工作版块</div>
            <div class="works-grid" id="worksGrid"></div>
        </div>

        <div class="footer">
            <p>贵州遵大数智化平台 v2.0.57 | 
               <a href="https://voadge.top:668" target="_blank">访问系统</a> | 
               服务器: 110.42.236.231 | 
               运行时间: <span id="uptime"></span>
            </p>
        </div>
    </div>

    <script>
        const EXTERN_URL = 'https://example.com';

        // 工作版块配置
        const workSections = [
            {
                title: 'A 研发管理', adminOnly: false,
                bg: '#2a0f1c', border: '#993556', color: '#e890b0',
                btnBg: '#3d1828', btnBorder: '#993556', btnColor: '#f4c0d1',
                items: [
                    { label: '研发项目', url: '#' }, { label: '研发记录', url: '#' },
                    { label: '研发归档', url: '#' }, { label: '研发验收', url: '#' },
                    { label: '物料领用', url: '#' }, { label: '研发人员', url: '#' },
                    { label: '研发会议', url: '#' }, { label: '研发费用', url: '#' },
                    { label: '设备使用', url: '#' }, { label: '研发工时', url: '#' }
                ]
            },
            {
                title: 'B 项目中心', adminOnly: false,
                bg: '#0f1f3d', border: '#185FA5', color: '#8cc4ff',
                btnBg: '#1a3055', btnBorder: '#185FA5', btnColor: '#b5d4f4',
                items: [
                    { label: '项目清单', url: '#' }, { label: '项目文档', url: '#' },
                    { label: '成本库', url: '#' }, { label: '日志填报', url: '#' },
                    { label: '施工日志', url: '#' }, { label: '安全会', url: '#' },
                    { label: '日常报备', url: '#' }, { label: '对甲计量', url: '#' },
                    { label: '分包计价', url: '#' }
                ]
            },
            {
                title: 'C 物资采购', adminOnly: false,
                bg: '#0f2a20', border: '#0f6e56', color: '#5cccb0',
                btnBg: '#1a3d30', btnBorder: '#0f6e56', btnColor: '#9fe1cb',
                items: [
                    { label: '物资库', url: '#' }, { label: '供应商', url: '#' },
                    { label: '需求计划', url: '#' }, { label: '采购计划', url: '#' },
                    { label: '采购订单', url: '#' }, { label: '入库', url: '#' },
                    { label: '出库', url: '#' }, { label: '实时库存', url: '#' },
                    { label: '库存盘点', url: '#' }, { label: '供应商结算', url: '#' }
                ]
            },
            {
                title: 'D 合同管理', adminOnly: false,
                bg: '#2a1f0b', border: '#854F0B', color: '#f0b84d',
                btnBg: '#3d2e14', btnBorder: '#854F0B', btnColor: '#fac775',
                items: [
                    { label: '合同库', url: '#' }, { label: '供应商信息', url: '#' },
                    { label: '合作准入', url: '#' }, { label: '付款台账', url: '#' }
                ]
            },
            {
                title: 'E 财务行政', adminOnly: false,
                bg: '#2a180b', border: '#b86e20', color: '#f5c87a',
                btnBg: '#3d2614', btnBorder: '#b86e20', btnColor: '#fadb9a',
                items: [
                    { label: '简报', url: '#' }, { label: '财务收支', url: '#' },
                    { label: '公告通知', url: '#' }, { label: '考勤打卡', url: '#' },
                    { label: '考勤归档', url: '#' }, { label: '印章使用', url: '#' }
                ]
            },
            {
                title: 'F 基础数据', adminOnly: false,
                bg: '#1a1a2e', border: '#4a4e69', color: '#b0b5d4',
                btnBg: '#282840', btnBorder: '#4a4e69', btnColor: '#ced2e8',
                items: [
                    { label: '资质库', url: '#' }, { label: '资质敏感信息', url: '#' },
                    { label: '制度文件', url: '#' }, { label: '法规政策', url: '#' },
                    { label: '标准规范', url: '#' }, { label: '模板库', url: '#' },
                    { label: '案例库', url: '#' }, { label: '库存编辑', url: '#' }
                ]
            },
            {
                title: 'G 系统管理', adminOnly: true,
                bg: '#1a1a1a', border: '#5a5a5a', color: '#a0a0a0',
                btnBg: '#2a2a2a', btnBorder: '#5a5a5a', btnColor: '#c0c0c0',
                items: [
                    { label: '流程日志', url: '#' }, { label: '审批记录', url: '#' },
                    { label: '自动计数器', url: '#' }
                ]
            }
        ];

        let isAdmin = false;
        async function checkAdmin() {
            try {
                const resp = await fetch('/api/users:check', { credentials: 'include' });
                if (resp.ok) {
                    const data = await resp.json();
                    const roles = data.data?.roles || [];
                    isAdmin = roles.some(r => ['admin','superadmin','root'].includes(r.name));
                }
            } catch {}
            renderWorks();
        }

        function renderWorks() {
            const grid = document.getElementById('worksGrid');
            grid.innerHTML = '';
            workSections.forEach(s => {
                if (s.adminOnly && !isAdmin) return;
                const g = document.createElement('div');
                g.className = 'work-group';
                g.style.cssText = `background:${s.bg};border-color:${s.border}`;
                const t = document.createElement('div');
                t.className = 'group-title'; t.style.color = s.color; t.textContent = s.title;
                g.appendChild(t);
                const l = document.createElement('div'); l.className = 'btn-list';
                s.items.forEach(item => {
                    const a = document.createElement('a');
                    a.className = 'btn-item'; a.href = item.url;
                    a.style.cssText = `background:${s.btnBg};border-color:${s.btnBorder};color:${s.btnColor}`;
                    a.textContent = item.label;
                    l.appendChild(a);
                });
                g.appendChild(l);
                grid.appendChild(g);
            });
        }

        // 待办
        async function fetchTodos() {
            const p = document.getElementById('pendingCount');
            const n = document.getElementById('notifyCount');
            try {
                const r = await fetch('/api/flow_nodes:list?filter[status]=pending&pageSize=1', { credentials:'include' });
                p.textContent = r.ok ? ((await r.json()).meta?.total ?? '0') : '0';
            } catch { p.textContent = '0'; }
            try {
                const r = await fetch('/api/notifications:list?filter[read]=false&pageSize=1', { credentials:'include' });
                n.textContent = r.ok ? ((await r.json()).meta?.total ?? '0') : '0';
            } catch { n.textContent = '0'; }
        }

        // 农历 / 节气 / 天气
        const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
        const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                          '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                          '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
        const solarTerms = ['小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨',
                           '立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑',
                           '白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'];
        const solarTermsDate = [
            [1,6],[1,20],[2,4],[2,19],[3,6],[3,21],[4,5],[4,20],
            [5,6],[5,21],[6,6],[6,21],[7,7],[7,23],[8,7],[8,23],
            [9,8],[9,23],[10,8],[10,23],[11,7],[11,22],[12,7],[12,22]
        ];
        const weatherCodes = {
            0:'晴',1:'晴',2:'多云',3:'阴',45:'雾',48:'雾',
            51:'毛毛雨',53:'毛毛雨',55:'毛毛雨',56:'冻雨',57:'冻雨',
            61:'小雨',63:'中雨',65:'大雨',66:'冻雨',67:'冻雨',
            71:'小雪',73:'中雪',75:'大雪',77:'雪粒',
            80:'阵雨',81:'阵雨',82:'阵雨',85:'阵雪',86:'阵雪',
            95:'雷暴',96:'雷暴',99:'雷暴'
        };
        const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

        function getSolarTerm(m,d) {
            for (let i=0;i<solarTermsDate.length;i++)
                if (solarTermsDate[i][0]===m && solarTermsDate[i][1]===d) return solarTerms[i];
            for (let i=0;i<solarTermsDate.length;i++) {
                const df=Math.abs(solarTermsDate[i][1]-d);
                if (solarTermsDate[i][0]===m && df<=1) return solarTerms[i]+'前后';
            }
            return '';
        }
        function getLunarDate(date) {
            const m=date.getMonth()+1, d=date.getDate();
            return { month: lunarMonths[(m+10)%12], day: lunarDays[(d+10)%30] };
        }

        let cycleIndex=0;
        const cycleIds=['dateDisplay','lunarDisplay','termDisplay','weekdayDisplay','weatherDisplay','tempDisplay'];
        function rotateCycle() {
            document.querySelectorAll('.cycle-item').forEach(e=>e.classList.remove('active'));
            document.getElementById(cycleIds[cycleIndex]).classList.add('active');
            cycleIndex=(cycleIndex+1)%cycleIds.length;
        }

        let weatherText='获取中…', tempText='--℃';
        function fetchWeather() {
            fetch('https://ip-api.com/json/')
                .then(r=>r.json())
                .then(loc=>{
                    if (loc.status==='success')
                        return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current_weather=true&timezone=Asia/Shanghai`);
                    throw Error();
                })
                .then(r=>r.json())
                .then(d=>{ if(d.current_weather){ weatherText=weatherCodes[d.current_weather.weathercode]||'未知'; tempText=d.current_weather.temperature+'℃'; } })
                .catch(()=>{ weatherText='--'; tempText='--℃'; });
        }

        function updateDisplay() {
            const n=new Date();
            const y=n.getFullYear(), mo=String(n.getMonth()+1).padStart(2,'0'), d=String(n.getDate()).padStart(2,'0');
            const h=String(n.getHours()).padStart(2,'0'), mi=String(n.getMinutes()).padStart(2,'0');
            document.getElementById('clockHour').textContent=h;
            document.getElementById('clockMin').textContent=mi;
            document.querySelector('#dateDisplay .label-date').textContent=`${y}年${mo}月${d}日`;
            const lu=getLunarDate(n);
            document.querySelector('#lunarDisplay .label-lunar').textContent=`农历${lu.month}月${lu.day}`;
            const t=getSolarTerm(n.getMonth()+1,n.getDate());
            document.querySelector('#termDisplay .label-term').textContent=t||'无节气';
            document.querySelector('#weekdayDisplay .label-week').textContent=weekdays[n.getDay()];
            document.querySelector('#weatherDisplay .label-weather').textContent=weatherText;
            document.querySelector('#tempDisplay .label-temp').textContent=tempText;
        }

        function updateUptime() {
            const s=new Date('2026-05-22T00:00:00');
            const n=new Date();
            const df=n-s;
            document.getElementById('uptime').textContent=`${Math.floor(df/86400000)}天 ${Math.floor((df%86400000)/3600000)}小时`;
        }

        document.getElementById('externFrame').src = EXTERN_URL;
        checkAdmin();
        fetchTodos();
        fetchWeather();
        updateDisplay();
        updateUptime();
        rotateCycle();
        setInterval(updateDisplay,1000);
        setInterval(updateUptime,60000);
        setInterval(rotateCycle,3000);
        setInterval(fetchWeather,600000);
    </script>
</body>
</html>
