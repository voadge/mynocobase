<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州遵大数智化平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c1426 0%, #1a2332 50%, #0d1926 100%);
            color: #e0e6ed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
        }

        .logo-container { flex-shrink: 0; }

        .logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
        }

        .title-container {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2em;
            font-weight: 300;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .header .subtitle {
            color: #5a6a7a;
            font-size: 0.85em;
            margin-top: 8px;
            letter-spacing: 4px;
        }

        /* ---- 统计卡片网格 ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.1), rgba(123, 44, 191, 0.05));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .stat-card:hover::before {
            left: 100%;
        }

        /* 时间模块 */
        .time-module {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: default;
        }
        .time-module:hover {
            transform: none !important;
            border-color: rgba(0, 212, 255, 0.2) !important;
            box-shadow: none !important;
        }

        .time-module .clock-digits {
            font-size: 2.2em;
            font-family: 'Consolas', 'Courier New', monospace;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.6), 0 0 24px rgba(0, 212, 255, 0.2);
            letter-spacing: 4px;
            line-height: 1.3;
        }

        .clock-digits .colon {
            display: inline-block;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.15; }
        }

        .info-cycle {
            height: 1.6em;
            overflow: hidden;
            position: relative;
            width: 100%;
            margin-top: auto;
        }

        .cycle-item {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            font-size: 0.72em;
            letter-spacing: 2px;
        }

        .cycle-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        .cycle-item .label-date { color: #e0e6ed; }
        .cycle-item .label-lunar { color: #7b2cbf; }
        .cycle-item .label-term  { color: #ffd93d; }
        .cycle-item .label-week  { color: #5a6a7a; }
        .cycle-item .label-weather { color: #00ff88; }
        .cycle-item .label-temp   { color: #ff6b6b; }

        /* 待办事项卡片 */
        .todo-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .todo-card .todo-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .todo-card .todo-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            flex-shrink: 0;
        }

        .todo-card .todo-icon.pending { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }
        .todo-card .todo-icon.notify  { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }

        .todo-card .todo-info { flex: 1; }
        .todo-card .todo-count {
            font-size: 2em;
            font-weight: 700;
            line-height: 1;
        }
        .todo-card .todo-count.pending-count { color: #00d4ff; text-shadow: 0 0 12px rgba(0, 212, 255, 0.4); }
        .todo-card .todo-count.notify-count  { color: #ff6b6b; text-shadow: 0 0 12px rgba(255, 107, 107, 0.4); }
        .todo-card .todo-label {
            font-size: 0.8em;
            color: #5a6a7a;
            margin-top: 2px;
        }

        /* ---- 工作版块 ---- */
        .work-section {
            margin-top: 20px;
        }

        .section-header {
            font-size: 1.2em;
            color: #00d4ff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 14px;
        }

        .work-group {
            border-radius: 10px;
            padding: 14px 12px 12px;
            border: 1px solid;
        }

        .work-group .group-title {
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .work-group .btn-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .work-group .btn-item {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.75em;
            text-decoration: none;
            border: 1px solid;
            cursor: pointer;
            transition: all 0.2s;
        }

        .work-group .btn-item:hover {
            filter: brightness(1.2);
            transform: translateX(3px);
        }

        /* ---- 底部 ---- */
        .footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #5a6a7a;
            font-size: 0.85em;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
        }

        .footer a { color: #00d4ff; text-decoration: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card, .work-group {
            animation: fadeIn 0.5s ease forwards;
        }
        .stat-card:nth-child(1) { animation-delay: 0s; }
        .stat-card:nth-child(2) { animation-delay: 0.15s; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .works-grid { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div class="logo-container">
                <img src="assets/logo.png" alt="遵大Logo" class="logo">
            </div>
            <div class="title-container">
                <h1>贵州遵大数智化平台</h1>
                <div class="subtitle">以道树业 致诚德信</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card time-module">
                <div class="clock-digits">
                    <span id="clockHour">00</span>
                    <span class="colon">:</span>
                    <span id="clockMin">00</span>
                </div>
                <div class="info-cycle">
                    <span class="cycle-item active" id="dateDisplay"><span class="label-date"></span></span>
                    <span class="cycle-item" id="lunarDisplay"><span class="label-lunar"></span></span>
                    <span class="cycle-item" id="termDisplay"><span class="label-term"></span></span>
                    <span class="cycle-item" id="weekdayDisplay"><span class="label-week"></span></span>
                    <span class="cycle-item" id="weatherDisplay"><span class="label-weather"></span></span>
                    <span class="cycle-item" id="tempDisplay"><span class="label-temp"></span></span>
                </div>
            </div>

            <div class="stat-card todo-card">
                <div class="todo-row">
                    <div class="todo-icon pending">📋</div>
                    <div class="todo-info">
                        <div class="todo-count pending-count" id="pendingCount">--</div>
                        <div class="todo-label">待办流程</div>
                    </div>
                </div>
                <div class="todo-row">
                    <div class="todo-icon notify">🔔</div>
                    <div class="todo-info">
                        <div class="todo-count notify-count" id="notifyCount">--</div>
                        <div class="todo-label">未读消息</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 工作版块 -->
        <div class="work-section">
            <div class="section-header">工作版块</div>
            <div class="works-grid" id="worksGrid"></div>
        </div>

        <div class="footer">
            <p>贵州遵大数智化平台 v2.0.57 | 
               <a href="https://voadge.top:668" target="_blank">访问系统</a> | 
               服务器: 110.42.236.231 | 
               运行时间: <span id="uptime"></span>
            </p>
        </div>
    </div>

    <script>
        // ============================================================
        //  工作版块配置 — 增删改直接编辑此数组即可
        //  adminOnly=true 的组仅对 admin/superadmin/root 可见
        //  url 可填完整地址或相对路径，暂用 # 占位
        // ============================================================
        const workSections = [
            {
                title: 'A 研发管理',
                bg: '#2a0f1c', border: '#993556', color: '#e890b0',
                btnBg: '#3d1828', btnBorder: '#993556', btnColor: '#f4c0d1',
                adminOnly: false,
                items: [
                    { label: '研发项目', url: '#' },
                    { label: '研发记录', url: '#' },
                    { label: '研发归档', url: '#' },
                    { label: '研发验收', url: '#' },
                    { label: '物料领用', url: '#' },
                    { label: '研发人员', url: '#' },
                    { label: '研发会议', url: '#' },
                    { label: '研发费用', url: '#' },
                    { label: '设备使用', url: '#' },
                    { label: '研发工时', url: '#' }
                ]
            },
            {
                title: 'B 项目中心',
                bg: '#0f1f3d', border: '#185FA5', color: '#8cc4ff',
                btnBg: '#1a3055', btnBorder: '#185FA5', btnColor: '#b5d4f4',
                adminOnly: false,
                items: [
                    { label: '项目清单', url: '#' },
                    { label: '项目文档', url: '#' },
                    { label: '成本库', url: '#' },
                    { label: '日志填报', url: '#' },
                    { label: '施工日志', url: '#' },
                    { label: '安全会', url: '#' },
                    { label: '日常报备', url: '#' },
                    { label: '对甲计量', url: '#' },
                    { label: '分包计价', url: '#' }
                ]
            },
            {
                title: 'C 物资采购',
                bg: '#0f2a20', border: '#0f6e56', color: '#5cccb0',
                btnBg: '#1a3d30', btnBorder: '#0f6e56', btnColor: '#9fe1cb',
                adminOnly: false,
                items: [
                    { label: '物资库', url: '#' },
                    { label: '供应商', url: '#' },
                    { label: '需求计划', url: '#' },
                    { label: '采购计划', url: '#' },
                    { label: '采购订单', url: '#' },
                    { label: '入库', url: '#' },
                    { label: '出库', url: '#' },
                    { label: '实时库存', url: '#' },
                    { label: '库存盘点', url: '#' },
                    { label: '供应商结算', url: '#' }
                ]
            },
            {
                title: 'D 合同管理',
                bg: '#2a1f0b', border: '#854F0B', color: '#f0b84d',
                btnBg: '#3d2e14', btnBorder: '#854F0B', btnColor: '#fac775',
                adminOnly: false,
                items: [
                    { label: '合同库', url: '#' },
                    { label: '供应商信息', url: '#' },
                    { label: '合作准入', url: '#' },
                    { label: '付款台账', url: '#' }
                ]
            },
            {
                title: 'E 财务行政',
                bg: '#2a180b', border: '#b86e20', color: '#f5c87a',
                btnBg: '#3d2614', btnBorder: '#b86e20', btnColor: '#fadb9a',
                adminOnly: false,
                items: [
                    { label: '简报', url: '#' },
                    { label: '财务收支', url: '#' },
                    { label: '公告通知', url: '#' },
                    { label: '考勤打卡', url: '#' },
                    { label: '考勤归档', url: '#' },
                    { label: '印章使用', url: '#' }
                ]
            },
            {
                title: 'F 基础数据',
                bg: '#1a1a2e', border: '#4a4e69', color: '#b0b5d4',
                btnBg: '#282840', btnBorder: '#4a4e69', btnColor: '#ced2e8',
                adminOnly: false,
                items: [
                    { label: '资质库', url: '#' },
                    { label: '资质敏感信息', url: '#' },
                    { label: '制度文件', url: '#' },
                    { label: '法规政策', url: '#' },
                    { label: '标准规范', url: '#' },
                    { label: '模板库', url: '#' },
                    { label: '案例库', url: '#' },
                    { label: '库存编辑', url: '#' }
                ]
            },
            {
                title: 'G 系统管理',
                bg: '#1a1a1a', border: '#5a5a5a', color: '#a0a0a0',
                btnBg: '#2a2a2a', btnBorder: '#5a5a5a', btnColor: '#c0c0c0',
                adminOnly: true,
                items: [
                    { label: '流程日志', url: '#' },
                    { label: '审批记录', url: '#' },
                    { label: '自动计数器', url: '#' }
                ]
            }
        ];

        // 检查当前用户角色，决定是否显示 adminOnly 组
        let isAdmin = false;
        async function checkAdmin() {
            try {
                const resp = await fetch('/api/users:check', { credentials: 'include' });
                if (resp.ok) {
                    const data = await resp.json();
                    const roles = data.data?.roles || [];
                    isAdmin = roles.some(r => ['admin','superadmin','root'].includes(r.name));
                }
            } catch {}
            renderWorks();
        }

        // 渲染工作版块
        function renderWorks() {
            const worksGrid = document.getElementById('worksGrid');
            worksGrid.innerHTML = '';
            workSections.forEach(s => {
                if (s.adminOnly && !isAdmin) return;
                const group = document.createElement('div');
                group.className = 'work-group';
                group.style.cssText = `background:${s.bg};border-color:${s.border}`;

                const title = document.createElement('div');
                title.className = 'group-title';
                title.style.color = s.color;
                title.textContent = s.title;
                group.appendChild(title);

                const list = document.createElement('div');
                list.className = 'btn-list';
                s.items.forEach(item => {
                    const a = document.createElement('a');
                    a.className = 'btn-item';
                    a.href = item.url;
                    a.style.cssText = `background:${s.btnBg};border-color:${s.btnBorder};color:${s.btnColor}`;
                    a.textContent = item.label;
                    list.appendChild(a);
                });
                group.appendChild(list);
                worksGrid.appendChild(group);
            });
        }

        // ============================================================
        //  待办事项数据
        // ============================================================
        async function fetchTodos() {
            const pendingEl = document.getElementById('pendingCount');
            const notifyEl = document.getElementById('notifyCount');
            try {
                const resp = await fetch('/api/flow_nodes:list?filter[status]=pending&pageSize=1', {
                    credentials: 'include'
                });
                if (resp.ok) {
                    const data = await resp.json();
                    pendingEl.textContent = data.meta?.total ?? '0';
                } else {
                    pendingEl.textContent = '0';
                }
            } catch {
                pendingEl.textContent = '0';
            }
            try {
                const resp = await fetch('/api/notifications:list?filter[read]=false&pageSize=1', {
                    credentials: 'include'
                });
                if (resp.ok) {
                    const data = await resp.json();
                    notifyEl.textContent = data.meta?.total ?? '0';
                } else {
                    notifyEl.textContent = '0';
                }
            } catch {
                notifyEl.textContent = '0';
            }
        }

        // ============================================================
        //  农历 / 节气 / 天气
        // ============================================================
        const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
        const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                          '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                          '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
        const solarTerms = ['小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨',
                           '立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑',
                           '白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'];
        const solarTermsDate = [
            [1,6],[1,20],[2,4],[2,19],[3,6],[3,21],[4,5],[4,20],
            [5,6],[5,21],[6,6],[6,21],[7,7],[7,23],[8,7],[8,23],
            [9,8],[9,23],[10,8],[10,23],[11,7],[11,22],[12,7],[12,22]
        ];
        const weatherCodes = {
            0:'晴',1:'晴',2:'多云',3:'阴',45:'雾',48:'雾',
            51:'毛毛雨',53:'毛毛雨',55:'毛毛雨',56:'冻雨',57:'冻雨',
            61:'小雨',63:'中雨',65:'大雨',66:'冻雨',67:'冻雨',
            71:'小雪',73:'中雪',75:'大雪',77:'雪粒',
            80:'阵雨',81:'阵雨',82:'阵雨',85:'阵雪',86:'阵雪',
            95:'雷暴',96:'雷暴',99:'雷暴'
        };
        const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

        function getSolarTerm(m,d) {
            for (let i=0;i<solarTermsDate.length;i++)
                if (solarTermsDate[i][0]===m && solarTermsDate[i][1]===d) return solarTerms[i];
            for (let i=0;i<solarTermsDate.length;i++) {
                const diff=Math.abs(solarTermsDate[i][1]-d);
                if (solarTermsDate[i][0]===m && diff<=1) return solarTerms[i]+'前后';
            }
            return '';
        }
        function getLunarDate(date) {
            const m=date.getMonth()+1, d=date.getDate();
            return { month: lunarMonths[(m+10)%12], day: lunarDays[(d+10)%30] };
        }

        // 循环滚动
        let cycleIndex=0;
        const cycleIds=['dateDisplay','lunarDisplay','termDisplay','weekdayDisplay','weatherDisplay','tempDisplay'];
        function rotateCycle() {
            document.querySelectorAll('.cycle-item').forEach(e=>e.classList.remove('active'));
            document.getElementById(cycleIds[cycleIndex]).classList.add('active');
            cycleIndex=(cycleIndex+1)%cycleIds.length;
        }

        let weatherText='获取中…', tempText='--℃';
        function fetchWeather() {
            fetch('https://ip-api.com/json/')
                .then(r=>r.json())
                .then(loc=>{
                    if (loc.status==='success')
                        return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current_weather=true&timezone=Asia/Shanghai`);
                    throw Error();
                })
                .then(r=>r.json())
                .then(d=>{ if(d.current_weather){ weatherText=weatherCodes[d.current_weather.weathercode]||'未知'; tempText=d.current_weather.temperature+'℃'; } })
                .catch(()=>{ weatherText='--'; tempText='--℃'; });
        }

        function updateDisplay() {
            const now=new Date();
            const y=now.getFullYear(), mo=String(now.getMonth()+1).padStart(2,'0'), d=String(now.getDate()).padStart(2,'0');
            const h=String(now.getHours()).padStart(2,'0'), mi=String(now.getMinutes()).padStart(2,'0');

            document.getElementById('clockHour').textContent=h;
            document.getElementById('clockMin').textContent=mi;
            document.querySelector('#dateDisplay .label-date').textContent=`${y}年${mo}月${d}日`;
            const lunar=getLunarDate(now);
            document.querySelector('#lunarDisplay .label-lunar').textContent=`农历${lunar.month}月${lunar.day}`;
            const term=getSolarTerm(now.getMonth()+1,now.getDate());
            document.querySelector('#termDisplay .label-term').textContent=term||'无节气';
            document.querySelector('#weekdayDisplay .label-week').textContent=weekdays[now.getDay()];
            document.querySelector('#weatherDisplay .label-weather').textContent=weatherText;
            document.querySelector('#tempDisplay .label-temp').textContent=tempText;
        }

        function updateUptime() {
            const start=new Date('2026-05-22T00:00:00');
            const now=new Date();
            const diff=now-start;
            document.getElementById('uptime').textContent=`${Math.floor(diff/86400000)}天 ${Math.floor((diff%86400000)/3600000)}小时`;
        }

        checkAdmin();
        fetchTodos();
        fetchWeather();
        updateDisplay();
        updateUptime();
        rotateCycle();
