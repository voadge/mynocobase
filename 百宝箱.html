<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百宝箱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#f1f5f9;display:flex;flex-direction:column;height:100vh}
.tab-bar{display:flex;gap:0;background:#fff;border-bottom:2px solid #e2e8f0;padding:0 16px;flex-shrink:0}
.tab-btn{padding:12px 20px;border:none;background:transparent;color:#64748b;font-size:14px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;font-family:inherit;white-space:nowrap}
.tab-btn:hover{color:#334155;background:#f8fafc}
.tab-btn.active{color:#3b82f6;border-bottom-color:#3b82f6;font-weight:600}
.iframe-wrap{flex:1;overflow:hidden;position:relative}
.iframe-wrap iframe{width:100%;height:100%;border:none;display:block}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:10}
.loading .spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{margin-top:12px;color:#94a3b8;font-size:13px}
</style>
</head>
<body>
<div class="tab-bar"><a href="/" style="display:flex;align-items:center;gap:4px;padding:12px 14px;color:#64748b;text-decoration:none;font-size:13px;border-right:1px solid #e2e8f0;margin-right:8px;transition:all .2s" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#64748b'">← 返回看板</a>
  <button class="tab-btn active" onclick="switchTab(0)">📋 发票报销助手</button>
  <button class="tab-btn" onclick="switchTab(1)">🖨️ 智能排版打印</button>
</div>
<div class="iframe-wrap" id="iframeWrap">
  <iframe id="mainFrame" src="/dashboard/行程发票报销助手.html"></iframe>
</div>
<script>
const PAGES = [
  '/dashboard/行程发票报销助手.html',
  '/dashboard/智能排版打印助手.html'
];
let currentTab = 0;
let loadedTabs = {0: true}; // tab 0 preloaded

function switchTab(idx) {
  if (idx === currentTab) return;
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  currentTab = idx;
  // Destroy old iframe, create new
  var wrap = document.getElementById('iframeWrap');
  var oldFrame = document.getElementById('mainFrame');
  if (oldFrame) oldFrame.remove();

  // Show loading
  var loading = document.createElement('div');
  loading.className = 'loading';
  loading.innerHTML = '<div style="text-align:center"><div class="spinner"></div><div class="spinner-text">加载中...</div></div>';
  wrap.appendChild(loading);

  // Create fresh iframe
  var f = document.createElement('iframe');
  f.id = 'mainFrame';
  f.src = PAGES[idx];
  f.onload = function() {
    var l = wrap.querySelector('.loading');
    if (l) l.remove();
  };
  // Fallback: remove loading after 15s
  setTimeout(function() {
    var l = wrap.querySelector('.loading');
    if (l) l.remove();
  }, 15000);
  wrap.appendChild(f);
  loadedTabs[idx] = true;
}
</script>
</body>
</html>
