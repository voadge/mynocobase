<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州遵大数智化平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #e0e6ed;
            min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0c1426 0%, #1a2332 50%, #0d1926 100%);
        }
        .dashboard {
            max-width: 100%;
            margin: 0;
            padding: 10px 14px;
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column;
            background: linear-gradient(135deg, #0c1426 0%, #1a2332 50%, #0d1926 100%);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 12px;
        }

        .logo-container { width: 20%; min-width: 180px; max-width: 220px; display: flex; justify-content: center; flex-shrink: 0; }

        .logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }

        .title-container { text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; }

        .header h1 {
            font-size: 2.1em; font-weight: 700; letter-spacing: 6px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .header .subtitle {
            color: #5a6a7a; font-size: 0.85em; margin-top: 6px; letter-spacing: 4px;
        }

        .header-right {
            width: 20%; min-width: 180px;
            display: flex; justify-content: center; align-items: center;
        }
        .enter-btn {
            padding: 8px 18px; border-radius: 8px; font-size: 0.85em; font-weight: 600;
            letter-spacing: 1px; cursor: pointer; font-family: inherit;
            color: #00d4ff; white-space: nowrap;
            background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(123,44,191,0.08));
            border: 1px solid;
            border-image: linear-gradient(135deg, #00d4ff, #7b2cbf) 1;
            transition: all 0.3s;
        }
        .enter-btn:hover {
            filter: brightness(1.2); transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }

        /* ---- 主舞台：大屏 + 左侧面板 ---- */
        .main-stage {
            width: 100%;
            margin-top: 2em;
            display: flex;
            gap: 14px;
            align-items: stretch;
        }

        /* 左侧面板：时间 + 待办 + 公告 + 打卡 —— 占 1/5 */
        .side-panel {
            flex: 0 0 20%;
            min-width: 180px;
            max-width: 220px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .side-panel .panel-card {
            flex: 1;
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.08), rgba(123, 44, 191, 0.03));
            border: 1px solid rgba(0, 212, 255, 0.18);
            border-radius: 12px;
            padding: 18px 16px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .clock-panel { justify-content: center; }

        /* 时间模块 */
        .side-panel .clock-digits {
            font-size: 2.2em;
            font-family: 'HarmonyOS Sans', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-weight: 500;
            color: #00d4ff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.6), 0 0 24px rgba(0, 212, 255, 0.2);
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 0.33em;
        }

        .clock-digits .colon { display: inline-block; animation: blink 1s step-end infinite; }

        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

        .side-panel .info-cycle {
            height: 1.8em; overflow: hidden; position: relative; width: 100%;
        }

        .side-panel .cycle-item {
            position: absolute; width: 100%; left: 0; top: 0; text-align: center;
            opacity: 0; transform: translateY(10px); transition: all 0.4s ease;
            font-size: 1.0em; letter-spacing: 2px;
        }

        .side-panel .cycle-item.active { opacity: 1; transform: translateY(0); }

        .cycle-item .label-date { color: #e0e6ed; }
        .cycle-item .label-lunar { color: #7b2cbf; }
        .cycle-item .label-term  { color: #ffd93d; }
        .cycle-item .label-week  { color: #5a6a7a; }
        .cycle-item .label-weather { color: #00ff88; }
        .cycle-item .label-temp   { color: #ff6b6b; }
        .cycle-item .label-warn   { color: #ff6b6b; }
        .cycle-item .label-location { color: #4fc3f7; font-size: 0.85em; }

        .clock-panel.warning-active {
            border-color: rgba(255, 107, 107, 0.6) !important;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.18), rgba(255, 165, 0, 0.1), rgba(123, 44, 191, 0.06)) !important;
            animation: warnGradient 3s ease infinite, warnPulse 2s ease-in-out infinite;
        }
        .clock-panel.warning-active .clock-digits {
            color: #ff6b6b;
            text-shadow: 0 0 12px rgba(255,107,107,0.6), 0 0 30px rgba(255,107,107,0.3);
        }
        .clock-panel.warning-active .clock-digits .colon {
            color: #ff6b6b;
        }
        .label-warn {
            color: #ff6b6b;
            font-size: 0.72em;
            font-weight: 600;
            letter-spacing: 1px;
            animation: warnFlash 1.5s ease-in-out infinite;
        }

        @keyframes warnGradient {
            0% { background-position: 0% 50%; background-size: 200% 200%; }
            50% { background-position: 100% 50%; background-size: 200% 200%; }
            100% { background-position: 0% 50%; background-size: 200% 200%; }
        }
        @keyframes warnPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); }
            50% { box-shadow: 0 0 24px 8px rgba(255,107,107,0.3); }
        }
        @keyframes warnFlash {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .warn-marquee {
            display: none;
            width: 100%;
            margin-top: 4px;
            overflow: hidden;
            white-space: nowrap;
            font-size: 0.7em;
            color: #ff6b6b;
            font-weight: 600;
            letter-spacing: 1px;
            height: 1.4em;
            line-height: 1.4em;
            text-shadow: 0 0 6px rgba(255,107,107,0.4);
        }
        .warn-marquee.active {
            display: block;
        }
        .warn-marquee span {
            display: inline-block;
            animation: marqueeScroll 12s linear infinite;
            padding-left: 100%;
        }
        @keyframes marqueeScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 待办模块 */
        .todo-inner {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-inner .todo-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .todo-inner .todo-icon {
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1em; flex-shrink: 0;
        }

        .todo-inner .todo-icon.pending { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }
        .todo-inner .todo-icon.notify  { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }

        .todo-inner .todo-info { flex: 1; }
        .todo-inner .todo-count {
            font-size: 1.6em; font-weight: 700; line-height: 1;
        }
        .todo-inner .todo-count.pending-count { color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        .todo-inner .todo-count.notify-count  { color: #ff6b6b; text-shadow: 0 0 10px rgba(255, 107, 107, 0.3); }
        .todo-inner .todo-label { font-size: 0.7em; color: #5a6a7a; margin-top: 1px; }

        /* 公司公告 */
        .announce-card { padding: 12px 14px 10px !important; align-items: stretch !important; }

        .announce-title {
            font-size: 0.78em; color: #ffd93d; margin-bottom: 6px; font-weight: 600;
            letter-spacing: 1px;
        }

        .announce-container {
            height: 188px;
            overflow: hidden;
            position: relative;
        }

        .announce-track {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .announce-track.scrolling {
            animation: scrollUp 40s linear infinite;
        }

        .announce-track.paused {
            animation-play-state: paused;
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .announce-item {
            font-size: 0.7em;
            color: #c8d0d8;
            padding: 5px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
            border-left: 2px solid rgba(255, 217, 61, 0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .announce-item .a-time {
            color: #5a6a7a;
            font-size: 0.85em;
            margin-right: 8px;
        }

        /* 考勤打卡 */
        .attend-card {
            align-items: center !important;
            padding: 14px 16px 16px !important;
            gap: 6px;
        }

        .attend-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .attend-label { font-size: 0.78em; color: #ffd93d; font-weight: 600; letter-spacing: 1px; }

        .attend-status {
            font-size: 0.65em; padding: 2px 8px; border-radius: 8px;
            background: rgba(0, 255, 136, 0.12); color: #00ff88;
        }
        .attend-status.out { background: rgba(255, 107, 107, 0.12); color: #ff6b6b; }

        .attend-btn {
            margin-top: 4px; width: 100%; padding: 8px 0; border: none; border-radius: 8px;
            font-size: 0.85em; font-weight: 600; letter-spacing: 2px; cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff; transition: all 0.3s;
        }
        .attend-btn:hover { filter: brightness(1.15); transform: scale(1.02); }
        .attend-btn:active { transform: scale(0.98); }
        .attend-btn.checked { background: linear-gradient(135deg, #ff6b6b, #b84d6b); }

        /* 百宝箱入口 */
        .toolbox-card {
            align-items: center !important;
            padding: 12px 16px !important;
            cursor: pointer;
            transition: all 0.3s;
        }
        .toolbox-card:hover {
            border-color: rgba(0, 212, 255, 0.5);
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.15), rgba(123, 44, 191, 0.08));
        }
        .toolbox-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            text-decoration: none;
            color: inherit;
        }
        .toolbox-icon { font-size: 1.2em; }
        .toolbox-label { font-size: 0.85em; color: #00d4ff; font-weight: 600; letter-spacing: 1px; }
        .toolbox-arrow { font-size: 0.9em; color: #5a6a7a; transition: transform 0.2s; }
        .toolbox-card:hover .toolbox-arrow { transform: translateX(3px); }
        .toolbox-shortcuts { display: flex; gap: 4px; width: 100%; margin-top: 6px; }
        .toolbox-shortcuts a { flex: 1; text-align: center; padding: 6px 2px; border-radius: 6px; font-size: 0.65em; text-decoration: none; color: #aab; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); transition: all 0.2s; }
        .toolbox-shortcuts a:hover { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.3); color: #00d4ff; }
        .attend-quick-types { display: flex; gap: 4px; width: 100%; margin-top: 4px; }
        .attend-quick-types span { flex: 1; text-align: center; padding: 4px 2px; border-radius: 6px; font-size: 0.65em; cursor: pointer; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); transition: all 0.2s; white-space: nowrap; }
        .attend-quick-types span:hover { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.3); }
        .attend-title-row { display: flex; align-items: center; justify-content: center; margin-bottom: 16px; position: relative; }
        .attend-title-row h3 { margin: 0; }
        .attend-time-display { position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: #5a6a7a; font-size: 0.72em; white-space: nowrap; }

        /* 大屏 iframe 容器 —— 占 4/5 */
        .stage-frame-wrap {
            flex: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.2);
            position: relative;
            background: linear-gradient(135deg, #0c1426 0%, #1a2332 50%, #0d1926 100%);
            aspect-ratio: 16 / 10;
        }
        .stage-frame-wrap iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; display: block;
        }
        .stage-frame-wrap:fullscreen,
        .stage-frame-wrap:-webkit-full-screen,
        .stage-frame-wrap:-moz-full-screen {
            aspect-ratio: auto; width: 100vw; height: 100vh; border-radius: 0;
        }
        .stage-frame-wrap:fullscreen iframe,
        .stage-frame-wrap:-webkit-full-screen iframe,
        .stage-frame-wrap:-moz-full-screen iframe {
            width: 100%; height: 100%; transition: none;
        }
        .stage-frame-wrap:fullscreen .stage-toolbar,
        .stage-frame-wrap:-webkit-full-screen .stage-toolbar,
        .stage-frame-wrap:-moz-full-screen .stage-toolbar {
            bottom: 0; padding: 12px 18px;
        }

        /* 全屏按钮 */
        .fs-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            background: rgba(0,0,0,0.55);
            color: #e0e6ed;
            font-size: 0.78em;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .fs-btn:hover {
            background: rgba(0,0,0,0.75);
            border-color: rgba(0, 212, 255, 0.6);
            color: #00d4ff;
        }

        /* 底部工具栏 */
        .stage-toolbar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            pointer-events: none;
        }

        .stage-toolbar > * { pointer-events: auto; }

        .st-left { display: flex; align-items: center; gap: 8px; }

        .st-btn {
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 5px;
            background: rgba(0,0,0,0.5);
            color: #e0e6ed;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            line-height: 1;
        }

        .st-btn:hover { background: rgba(0,0,0,0.75); border-color: rgba(0, 212, 255, 0.5); color: #00d4ff; }

        .st-label {
            font-size: 0.78em;
            color: rgba(255,255,255,0.8);
            min-width: 80px;
            text-align: center;
        }

        /* ---- 工作版块 ---- */
        .work-section { margin-top: 28px; }

        .section-header {
            font-size: 1.1em; color: #00d4ff; margin-bottom: 16px;
            padding-bottom: 8px; border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            display: flex; align-items: center; gap: 10px;
        }

        .section-header::before {
            content: ''; width: 4px; height: 18px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf); border-radius: 2px;
        }
        .section-header { cursor: pointer; user-select: none; }
        .collapse-arrow { margin-left: auto; transition: transform 0.25s; font-size: 0.75em; }
        .work-section.collapsed .works-grid { display: none; }
        .work-section.collapsed .collapse-arrow { transform: rotate(-90deg); }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
        }

        .work-group {
            border-radius: 10px; padding: 12px 10px 10px; border: 1px solid;
        }

        .work-group .group-title {
            font-size: 0.82em; font-weight: 600; margin-bottom: 8px;
            padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .work-group .btn-list { display: flex; flex-direction: column; gap: 4px; }

        .work-group .btn-item {
            display: inline-block; padding: 4px 8px; border-radius: 4px;
            font-size: 0.72em; text-decoration: none; border: 1px solid;
            cursor: pointer; transition: all 0.2s;
        }

        .work-group .btn-item:hover { filter: brightness(1.2); transform: translateX(3px); }

        /* ---- 抽屉面板 ---- */
        .drawer-overlay {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
        }
        .drawer-overlay.show { display: flex; justify-content: flex-end; }
        .drawer-panel {
            width: 92vw; max-width: 1400px; height: 100vh;
            background: #f0f2f5; display: flex; flex-direction: column;
            box-shadow: -8px 0 40px rgba(0,0,0,0.4);
            animation: drawerSlideIn 0.28s ease;
        }
        @keyframes drawerSlideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .drawer-floating-actions {
            position: absolute; top: 8px; left: 50%; z-index: 10;
            transform: translateX(calc(-50% + 400px)); display: flex; gap: 10px;
        }
        .drawer-floating-btn {
            width: 30px; height: 30px; border-radius: 50%;
            background: transparent; border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.7); font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .drawer-floating-btn:hover {
            color: #fff; border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.08);
        }
        @media (max-width: 768px) {
            .drawer-floating-actions { left: auto; right: 50px; transform: none; }
        }
        .drawer-loader {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 0; gap: 16px;
        }
        .drawer-loader.active { display: flex; }
        .loader-spinner {
            width: 40px; height: 40px; border: 3px solid #e0e0e0;
            border-top: 3px solid #1890ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: #666; font-size: 0.9em; }
        .drawer-body { flex: 1; position: relative; overflow: hidden; }
        .drawer-body iframe {
            width: 100%; height: 100%; border: none;
            display: block;
        }
        /* ---- 底部 ---- */
        .footer {
            margin-top: 30px; padding: 18px; text-align: center;
            color: #5a6a7a; font-size: 0.82em;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
        }
        .footer a { color: #00d4ff; text-decoration: none; }
        .beian-icon { height: 16px; vertical-align: middle; margin-right: 2px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .side-panel .panel-card, .work-group {
            animation: fadeIn 0.5s ease forwards;
        }

        @media (max-width: 768px) {
            /* 第 1 行：大屏 */
            .main-stage { flex-direction: column; width: 100%; flex: 1; min-height: 0; }
            .stage-frame-wrap { order: -1; min-height: 260px; width: 100%; aspect-ratio: auto; flex: 1 1 auto; align-self: stretch; background: linear-gradient(135deg, #0c1426 0%, #1a2332 50%, #0d1926 100%); }

            /* 第 2-3 行：侧面板 2 列 */
            .side-panel {
                flex: unset; width: 100%; min-width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 4px;
            }
            .side-panel .panel-card { padding: 10px 8px 8px; min-width: 0; width: auto; }

            /* 隐藏原第 4、5 张卡（考勤卡、百宝箱卡） */
            .side-panel .panel-card:nth-child(4),
            .side-panel .panel-card:nth-child(5) { display: none; }

            /* 第 2 行：时间（左）+ 待办（右） */
            .side-panel .clock-digits { font-size: 1.7em; margin-bottom: 0.2em; white-space: nowrap; }
            .info-cycle { height: 1.2em; }
            .cycle-item { font-size: 0.7em; }
            .todo-inner .todo-count { font-size: 1.1em; white-space: nowrap; }
            .todo-inner .todo-icon { width: 28px; height: 28px; font-size: 0.9em; }

            /* 公告：左列跨行 2-4，与右侧三个按钮等高 */
            .announce-container { height: auto; }
            .side-panel .panel-card:nth-child(3) { grid-column: 1; grid-row: 2 / 5; }

            /* 右侧三个独立按钮卡片竖向排列 */
            .side-panel .panel-card.mobile-only {
                display: flex !important;
                align-items: center; justify-content: center;
                grid-column: 2; padding: 6px 8px; cursor: pointer;
            }
            .side-panel .panel-card:nth-child(6) { grid-row: 2; }
            .side-panel .panel-card:nth-child(7) { grid-row: 3; }
            .side-panel .panel-card:nth-child(8) { grid-row: 4; }
            .mob-act-btn {
                width: 100%; border: none; background: none;
                font-size: 0.78em; font-weight: 600; letter-spacing: 0.5px;
                text-align: center; cursor: pointer; font-family: inherit;
                color: #e0e6ed; text-decoration: none;
                display: flex; align-items: center; justify-content: center; gap: 4px;
                padding: 6px 0; border-radius: 4px;
            }

        var __geofencesCache = null;         // 缓存，[ { id, fence_name, polyline_coords, buffer_radius, bbox_* } ]
        var __geofencesCacheTime = 0;        // 缓存时间戳
        var __polylineGeofenceResult = null; // { inside, distance, fenceId, fenceName, bufferRadius, matched }

        // ---- WGS-84 ↔ GCJ-02 坐标转换（匹配高德瓦片偏移）----
        var _pi = 3.141592653589793;
        var _a = 6378245.0;
        var _ee = 0.00669342162296594323;
        function _transformLat(x, y) {
            var ret = -100 + 2*x + 3*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x));
            ret += (20*Math.sin(6*x*_pi) + 20*Math.sin(2*x*_pi)) * 2/3;
            ret += (20*Math.sin(y*_pi) + 40*Math.sin(y/3*_pi)) * 2/3;
            ret += (160*Math.sin(y/12*_pi) + 320*Math.sin(y*_pi/30)) * 2/3;
            return ret;
        }
        function _transformLng(x, y) {
            var ret = 300 + x + 2*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x));
            ret += (20*Math.sin(6*x*_pi) + 20*Math.sin(2*x*_pi)) * 2/3;
            ret += (20*Math.sin(x*_pi) + 40*Math.sin(x/3*_pi)) * 2/3;
            ret += (150*Math.sin(x/12*_pi) + 300*Math.sin(x/30*_pi)) * 2/3;
            return ret;
        }
        function _outOfChina(lat, lng) { return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271; }
        function wgs84ToGcj02(lat, lng) {
            if (_outOfChina(lat, lng)) return [lat, lng];
            var dLat = _transformLat(lng - 105, lat - 35);
            var dLng = _transformLng(lng - 105, lat - 35);
            var radLat = lat / 180 * _pi;
            var magic = Math.sin(radLat);
            magic = 1 - _ee * magic * magic;
            var sqrtMagic = Math.sqrt(magic);
            dLat = (dLat * 180) / ((_a * (1 - _ee)) / (magic * sqrtMagic) * _pi);
            dLng = (dLng * 180) / (_a / sqrtMagic * Math.cos(radLat) * _pi);
            return [lat + dLat, lng + dLng];
        }
        function wgs84ToGcj02Point(lat, lng) {
            var p = wgs84ToGcj02(lat, lng);
            return { lat: p[0], lng: p[1] };
        }

        // 获取围栏列表（带 session 级缓存）
        async function fetchGeofences() {
            var now = Date.now();
            if (__geofencesCache && (now - __geofencesCacheTime < 300000)) { // 5分钟缓存
                return __geofencesCache;
            }
            try {

        // Haversine 距离（米）
        function haversineDist(lat1, lon1, lat2, lon2) {
            var R = 6371000;
            var toRad = Math.PI / 180;
            var dLat = (lat2 - lat1) * toRad;
            var dLon = (lon2 - lon1) * toRad;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // 点到线段最短距离
        function pointToSegmentDistance(lat, lon, lat1, lon1, lat2, lon2) {
            var dAC = haversineDist(lat, lon, lat1, lon1);
            var dBC = haversineDist(lat, lon, lat2, lon2);
            var dAB = haversineDist(lat1, lon1, lat2, lon2);
            if (dAB < 1) return dAC;
            var cosA = (dAC * dAC + dAB * dAB - dBC * dBC) / (2 * dAC * dAB);
            var cosB = (dBC * dBC + dAB * dAB - dAC * dAC) / (2 * dBC * dAB);
            if (cosA <= 0) return dAC;
            if (cosB <= 0) return dBC;
            var s = (dAC + dBC + dAB) / 2;
            var area = Math.sqrt(Math.max(0, s * (s - dAC) * (s - dBC) * (s - dAB)));
            return area * 2 / dAB;
        }

        // GPS 点到折线最短距离
        function distanceToPolyline(lat, lon, polyline) {
            var minDist = Infinity;
            for (var i = 0; i < polyline.length - 1; i++) {
                var dist = pointToSegmentDistance(lat, lon, polyline[i][1], polyline[i][0], polyline[i + 1][1], polyline[i + 1][0]);
                if (dist < minDist) minDist = dist;
            }
            return Math.round(minDist);
        }

        // 折线围栏检测（含 bbox 预过滤）
        async function checkPolylineGeofence(lat, lng) {
            var fences = await fetchGeofences();
            if (!fences || fences.length === 0) {
                __polylineGeofenceResult = { inside: true, distance: 0, fenceId: null, fenceName: null, bufferRadius: null, matched: false };
                return __polylineGeofenceResult;
            }

            var minDist = Infinity;
            var matchedFence = null;

            for (var i = 0; i < fences.length; i++) {
                var fence = fences[i];
                // Bbox 预过滤（含缓冲区半径扩展）
                if (fence.bbox_min_lat != null && fence.bbox_max_lat != null &&
                    fence.bbox_min_lng != null && fence.bbox_max_lng != null) {
                    var bufDeg = (fence.buffer_radius || 200) / 111320;
                    var bufDegLng = bufDeg / Math.cos(lat * Math.PI / 180);
                    if (lat < fence.bbox_min_lat - bufDeg || lat > fence.bbox_max_lat + bufDeg ||
                        lng < fence.bbox_min_lng - bufDegLng || lng > fence.bbox_max_lng + bufDegLng) {
                        continue;
                    }
                }
                var polyline;
                try { polyline = JSON.parse(fence.polyline_coords); } catch(e) { continue; }
                if (!Array.isArray(polyline) || polyline.length < 2) continue;

                var dist = distanceToPolyline(lat, lng, polyline);
                if (dist < minDist) { minDist = dist; matchedFence = fence; }
            }

            var bufferRadius = matchedFence ? matchedFence.buffer_radius : 200;
            var isInside = matchedFence ? minDist <= bufferRadius : true;

            __polylineGeofenceResult = {
                inside: isInside,
                distance: minDist < Infinity ? minDist : null,
                fenceId: matchedFence ? matchedFence.id : null,
                fenceName: matchedFence ? matchedFence.fence_name : null,
                bufferRadius: bufferRadius,
                matched: matchedFence !== null
            };
            return __polylineGeofenceResult;
        }

        // ---------- 旧版圆形围栏（保留兼容）----------
        var geofenceConfig = {
            enabled: true,
            centerLat: 27.706,
            centerLng: 106.937,
            radius: 300
        };
        var geofenceResult = null;

        function checkGeofence(lat, lng) {
            if (!geofenceConfig.enabled) {
                geofenceResult = { inside: true, distance: 0, centerLat: geofenceConfig.centerLat, centerLng: geofenceConfig.centerLng, radius: geofenceConfig.radius, skipped: true };
                return geofenceResult;
            }
            var R = 6371000;
            var dLat = (lat - geofenceConfig.centerLat) * Math.PI / 180;
            var dLng = (lng - geofenceConfig.centerLng) * Math.PI / 180;
            var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(geofenceConfig.centerLat * Math.PI / 180) * Math.cos(lat * Math.PI / 180) *
                    Math.sin(dLng/2) * Math.sin(dLng/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            var distance = R * c;
            geofenceResult = {
                inside: distance <= geofenceConfig.radius,
                distance: Math.round(distance),
                centerLat: geofenceConfig.centerLat,
                centerLng: geofenceConfig.centerLng,
                radius: geofenceConfig.radius,
                skipped: false
            };
            return geofenceResult;
        }

        function _tryCamera(v, retryBtn) {
            if (_cameraResLevel >= _cameraResolutions.length) {
                _showCameraHelp();
                document.getElementById('cameraSwitchBtn').disabled = true;
                if (retryBtn) retryBtn.style.display = 'block';
                return;
            }
            var res = _cameraResolutions[_cameraResLevel];
            var constraints = {video:Object.assign({}, res, {facingMode:_cameraFacingMode}), audio:false};
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream){
                    cameraStream = stream;
                    v.srcObject = stream;
                    v.style.display = 'block';
                    v.setAttribute('playsinline', '');
                    v.setAttribute('muted', '');
                    document.getElementById('captureBtn').disabled = false;
                    document.getElementById('cameraSwitchBtn').disabled = false;
                    document.getElementById('faceStatus').textContent = '📷 请拍摄人脸';
                    document.getElementById('faceStatus').className = 'face-status';
                    if (retryBtn) retryBtn.style.display = 'none';
                })
                .catch(function(err){
                    if (_cameraResLevel === 0 && err.name === 'NotAllowedError') {
                        _showCameraHelp();
                        document.getElementById('cameraSwitchBtn').disabled = true;
                        if (retryBtn) retryBtn.style.display = 'block';
                        return;
                    }
                    _cameraResLevel++;
                    _tryCamera(v, retryBtn);
                });

                .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(function(data){

                        var parts = data.rectangle.split(';');

                });

        function _onLocationSuccess(pos) {
            var rawLat = pos.coords.latitude, rawLng = pos.coords.longitude;
            var gcj = wgs84ToGcj02(rawLat, rawLng);
            attendLocation = {
                lat: gcj[0],
                lng: gcj[1],
                accuracy: pos.coords.accuracy
            };
            gpsState = 'ok';
            var acc = Math.round(pos.coords.accuracy);
            var accLabel = '';
            if (acc < 5) accLabel = '（高精度）';
            else if (acc < 50) accLabel = '（一般）';
            else accLabel = '（精度低）';
            document.getElementById('attendLocation').textContent = gcj[0].toFixed(5) + ',' + gcj[1].toFixed(5) + ' ±' + acc + 'm ' + accLabel;
            var locMsg = '✓ 位置已获取';
            document.getElementById('locationStatus').innerHTML = locMsg;
            document.getElementById('locationStatus').setAttribute('data-base', locMsg);
            document.getElementById('locationStatus').className = 'attend-location-status got';
            checkPolylineGeofence(gcj[0], gcj[1]).then(function(){ updateSubmitState(); }).catch(function(){ updateSubmitState(); });
        }

        function _getLocationOnce(highAccuracy) {
            // Capacitor native geolocation
            if (_isCapacitor && Capacitor.Plugins && Capacitor.Plugins.Geolocation) {
                Capacitor.Plugins.Geolocation.getCurrentPosition({ enableHighAccuracy: highAccuracy, timeout: 15000 })
                    .then(function(pos){ _onLocationSuccess(pos); })
                    .catch(function(err){
                        attendLocation = null; gpsState = 'fail';
                        document.getElementById('attendLocation').innerHTML = (err.message || '获取失败') + ' <a href="javascript:void(0)" onclick="getLocation()" style="color:#00d4ff;font-size:0.82em">重试</a>';
                        _getLocationByIP();
                    });
                return;
            }
            // HarmonyOS native bridge
            if (_isHarmony && window.appBridge.getLocation) {
                window.appBridge.getLocation(
                    function(lat, lng, acc){ _onLocationSuccess({ coords: { latitude: lat, longitude: lng, accuracy: acc } }); },
                    function(err){
                        attendLocation = null; gpsState = 'fail';
                        document.getElementById('attendLocation').innerHTML = (err || '获取失败') + ' <a href="javascript:void(0)" onclick="getLocation()" style="color:#00d4ff;font-size:0.82em">重试</a>';
                        _getLocationByIP();
                    }
                );
                return;
            }
            // Browser geolocation
            navigator.geolocation.getCurrentPosition(
                _onLocationSuccess,
                function(err){
                    if (highAccuracy && (err.code === 2 || err.code === 3) && !_gpsRetried) {
                        _gpsRetried = true;
                        document.getElementById('attendLocation').innerHTML = '降级定位中...';
                        _getLocationOnce(false);
                        return;
                    }
                    attendLocation = null;
                    gpsState = 'fail';
                    var msg = '获取失败';
                    if (err.code === 1) msg = '权限被拒绝';
                    else if (err.code === 2) msg = '位置不可用';
                    else if (err.code === 3) msg = '获取超时';
                    document.getElementById('attendLocation').innerHTML = msg + ' <a href="javascript:void(0)" onclick="getLocation()" style="color:#00d4ff;font-size:0.82em">重试</a>';
                    _getLocationByIP();
                },
                {enableHighAccuracy:highAccuracy, timeout:15000, maximumAge:5000}
            );
        }

                ctx.drawImage(v, cx, cy, cw, ch, 0, 0, c.width, c.height);

                ctx.drawImage(v, 0, 0);

            attendPhoto = c.toDataURL('image/jpeg', 0.92);
            document.getElementById('captureBtn').textContent = '✓';
            detectFace(c);
        }

        async function detectFace(canvas) {
            document.getElementById('faceStatus').textContent = '🔍 检测人脸中...';
            document.getElementById('faceStatus').className = 'face-status';
            faceDetected = false;
            // Brightness check
            try {
                var ctx = canvas.getContext('2d');
                var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                var pixels = imageData.data;
                var total = 0;
                for (var k = 0; k < pixels.length; k += 4) {
                    total += 0.299 * pixels[k] + 0.587 * pixels[k+1] + 0.114 * pixels[k+2];
                }
                var avgBrightness = total / (pixels.length / 4);
                if (avgBrightness < 40) {
                    document.getElementById('faceStatus').textContent = '⚠ 环境过暗，建议补光后重拍';
                    document.getElementById('faceStatus').className = 'face-status unverified';
                    updateSubmitState();
                    return;
                }
            } catch(e) {}
            // FaceDetector API
            if (typeof FaceDetector !== 'undefined') {
                try {
                    var detector = new FaceDetector({fastMode:true});
                    var faces = await detector.detect(canvas);
                    if (faces.length > 0) {
                        faceDetected = true;

                        document.getElementById('faceStatus').className = 'face-status verified';
                        document.getElementById('faceIndicator').className = 'face-indicator verified';
                        // Draw face boxes
                        var ctx = canvas.getContext('2d');
                        ctx.strokeStyle = '#00ff88';
                        ctx.lineWidth = 3;
                        for (var f = 0; f < faces.length; f++) {
                            var box = faces[f].boundingBox;
                            ctx.strokeRect(box.x, box.y, box.width, box.height);
                        }
                    } else {
                        document.getElementById('faceStatus').textContent = '⚠ 未检测到人脸，请重新拍摄';
                        document.getElementById('faceStatus').className = 'face-status unverified';
                        document.getElementById('faceIndicator').className = 'face-indicator unverified';
                    }
                } catch(e) {
                    document.getElementById('faceStatus').textContent = '📷 已拍照';
                    document.getElementById('faceStatus').className = 'face-status';
                    faceDetected = null;
                }
            } else {
                document.getElementById('faceStatus').textContent = '📷 已拍照';
                document.getElementById('faceStatus').className = 'face-status';
                faceDetected = null;
            }
            updateSubmitState();
        }

        // Fingerprint with custom confirm dialog
        async function verifyFingerprint() {
            var s = document.getElementById('fingerStatus');
            var b = document.getElementById('fingerBtn');
            b.disabled = true;
            b.textContent = '验证中...';
            _fingerVerified = false;
            _deviceFp = null;

            // Build enhanced device fingerprint
            var fpData = navigator.userAgent + '|' + screen.width + 'x' + screen.height + '|' +
                         (navigator.hardwareConcurrency||'') + '|' + (navigator.deviceMemory||'') + '|' +
                         Intl.DateTimeFormat().resolvedOptions().timeZone + '|' +
                         (navigator.languages||[]).join(',') + '|' +
                         (navigator.plugins ? navigator.plugins.length : '0');

            // Try SHA-256 via SubtleCrypto
            try {
                var enc = new TextEncoder();
                var hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(fpData));
                var hashArr = Array.from(new Uint8Array(hashBuf));
                var hex = hashArr.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
                _deviceFp = 'dev_' + hex.substring(0, 16);
            } catch(e) {
                // Fallback to DJB2
                var fpHash = 0;
                for (var i = 0; i < fpData.length; i++) { fpHash = ((fpHash << 5) - fpHash) + fpData.charCodeAt(i); fpHash |= 0; }
                _deviceFp = 'dev_' + Math.abs(fpHash).toString(36);
            }

            // Check localStorage for quick re-verify (1-week expiry)
            var stored = localStorage.getItem('_attendDeviceId');
            var storedTime = localStorage.getItem('_attendDeviceId_time');
            if (stored === _deviceFp && storedTime && (Date.now() - parseInt(storedTime) < 7 * 24 * 60 * 60 * 1000)) {
                _fingerVerified = true;
                _fingerVerifiedAt = Date.now();
                s.textContent = '✓ 本机已验证（快速）';
                s.className = 'attend-finger-status verified';
                b.textContent = '✓ 已验证';
                b.className = 'attend-finger-btn verified';
                updateSubmitState();
                return;
            }

            // Capacitor native biometric
            if (_isCapacitor && Capacitor.Plugins && Capacitor.Plugins.BiometricAuth) {
                try {
                    var avail = await Capacitor.Plugins.BiometricAuth.checkBiometry();
                    if (avail && avail.isAvailable) {
                        await Capacitor.Plugins.BiometricAuth.authenticate({ reason: '验证指纹以完成打卡' });
                        _fingerVerified = true;
                        _fingerVerifiedAt = Date.now();
                        s.textContent = '✓ 本机已验证（生物识别）';
                        s.className = 'attend-finger-status verified';
                        b.textContent = '✓ 已验证';
                        b.className = 'attend-finger-btn verified';
                        localStorage.setItem('_attendDeviceId', _deviceFp);
                        localStorage.setItem('_attendDeviceId_time', String(Date.now()));
                        updateSubmitState();
                        return;
                    }
                } catch(e) {}
            }
            // HarmonyOS native biometric
            if (_isHarmony && window.appBridge.biometricAuth) {
                try {
                    var hResult = await window.appBridge.biometricAuth();
                    if (hResult) {
                        _fingerVerified = true;
                        _fingerVerifiedAt = Date.now();
                        s.textContent = '✓ 本机已验证（生物识别）';
                        s.className = 'attend-finger-status verified';
                        b.textContent = '✓ 已验证';
                        b.className = 'attend-finger-btn verified';
                        localStorage.setItem('_attendDeviceId', _deviceFp);
                        localStorage.setItem('_attendDeviceId_time', String(Date.now()));
                        updateSubmitState();
                        return;
                    }
                } catch(e) {}
            }

            // Show custom confirm dialog
            b.textContent = '请确认';
            document.getElementById('fingerDeviceId').textContent = _deviceFp.substring(0, 16) + '...';
            document.getElementById('fingerConfirmOverlay').classList.add('visible');
        }

        async function computePhotoHash(dataUrl) {
            var hashInput = dataUrl.substring(dataUrl.length - 500);
            try {
                var enc = new TextEncoder();
                var hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(hashInput));
                var hashArr = Array.from(new Uint8Array(hashBuf));
                var hex = hashArr.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
                return 'ph_' + hex.substring(0, 8);
            } catch(e) {
                var hashVal = 0;
                for (var i = 0; i < hashInput.length; i++) { hashVal = ((hashVal << 5) - hashVal) + hashInput.charCodeAt(i); hashVal |= 0; }
                return 'ph_' + Math.abs(hashVal).toString(16);
            }
        }

        async function submitAttendance() {
            var btn = document.getElementById('attendSubmit');
            btn.disabled = true;
            btn.textContent = '提交中...';
            try {
                var now = new Date();
                var isLeave = (attendType === '请假' || attendType === '出差');
                var body = {
                    check_type: attendType,
                    check_time: now.toISOString(),
                    gps_state: gpsState
                };

                // 地理围栏信息
                var pgr = __polylineGeofenceResult;
                if (pgr && pgr.matched) {
                    body.geofence_inside = pgr.inside;
                    body.geofence_distance = pgr.distance;
                    body.geofence_id = pgr.fenceId;
                }

                // Location (always include if available)
                if (attendLocation) {
                    body.latitude = attendLocation.lat;
                    body.longitude = attendLocation.lng;
                    body.gps_accuracy = Math.round(attendLocation.accuracy);
                } else if (_manualLocation) {
                    body.manual_location = _manualLocation;
                }

                if (isLeave) {
                    // Leave/travel submission — backend handles workflow_status & verify_status
                    body.reason = document.getElementById('leaveReason').value.trim();
                    var sd = document.getElementById('leaveStartDate').value;
                    var ed = document.getElementById('leaveEndDate').value;
                    if (sd && ed && sd > ed) {
                        btn.textContent = '✗ 开始日期不能晚于结束日期';
                        btn.disabled = false;
                        return;
                    }
                    body.start_date = sd || now.toISOString();
                    body.end_date = ed || now.toISOString();
                } else {
                    // Normal check-in/out
                    var methods = [];
                    if (gpsState === 'ok') methods.push('gps');
                    else if (gpsState === 'ip') methods.push('ip_location');
                    else if (gpsState === 'manual') methods.push('manual_location');
                    if (faceDetected === true) methods.push('face');
                    else if (faceDetected === false) methods.push('face_fail');
                    else if (attendPhoto) methods.push('photo_only');
                    if (_fingerVerified) methods.push('finger');
                    body.verify_status = methods.join('+');

                    if (_deviceFp && _fingerVerified) {
                        body.device_fingerprint = _deviceFp;
                    }
                    if (_fingerVerifiedAt) {
                        body.fingerprint_verified_at = new Date(_fingerVerifiedAt).toISOString();
                    }
                    // Photo hash (always)
                    if (attendPhoto) {
                        body.photo_hash = await computePhotoHash(attendPhoto);
                    }
                    // Fallback device fingerprint
                    if (!body.device_fingerprint) {
                        body.device_fingerprint = navigator.userAgent.substring(0, 200) + '|' + screen.width + 'x' + screen.height;
                    }
                }

                var _token = localStorage.getItem("NOCOBASE_TOKEN") || localStorage.getItem("nocobase_token");
                var _headers = { 'Content-Type': 'application/json' };
                if (_token) _headers['Authorization'] = 'Bearer ' + _token;
                var r = await fetch('/api/__pd__/attendance/submit', {
                    method: 'POST', credentials: 'include',
                    headers: _headers,
                    body: JSON.stringify(body)
                });
                if (r.ok) {
                    var _j = await r.json().catch(function(){ return null; });
                    var msg = (_j && _j.message) || '提交成功';
                    if (isLeave) {
                        btn.textContent = '✅ ' + msg;
                        btn.style.background = 'linear-gradient(135deg, #ffd93d, #f39c12)';
                        btn.disabled = true;
                        document.getElementById('attendLeaveStatus').textContent = '✅ ' + msg;
                        document.getElementById('attendLeaveStatus').className = 'attend-leave-status pending';
                    } else {
                        btn.textContent = '✓ ' + msg;
                        btn.style.background = 'linear-gradient(135deg, #00ff88, #00b86b)';
                        setTimeout(closeAttendModal, 1200);
                    }
                    fetchAttendance();
                } else {
                    var errData = await r.json().catch(function(){return {error: '无法解析错误响应'};});
                    var errMsg = (errData && (errData.errors || errData.error || JSON.stringify(errData))) || 'HTTP ' + r.status;
                    if (typeof errMsg === 'object') errMsg = JSON.stringify(errMsg);
                    btn.textContent = '✗ ' + errMsg.substring(0, 60) + (errMsg.length > 60 ? '...' : '');
                    btn.disabled = false;
                    console.error('Attendance failed:', errData);
                }
            } catch(e) {
                btn.textContent = '✗ 网络错误，重试';
                btn.disabled = false;
                console.error('Attendance error:', e);
            }
        }

        // Fetch current day status for display
        let attendState = null;
        async function fetchAttendance() {
            try {
                var today = new Date();
                var start = new Date(today.getFullYear(), today.getMonth(), today.getDate()).toISOString();
                var end = new Date(today.getFullYear(), today.getMonth(), today.getDate()+1).toISOString();
                var _listToken = localStorage.getItem("NOCOBASE_TOKEN") || localStorage.getItem("nocobase_token");
                var _listHeaders = {};
                if (_listToken) _listHeaders['Authorization'] = 'Bearer ' + _listToken;
                var r = await fetch('/api/attendance_records:list?filter[check_time][$dateBetween]=' +
                    encodeURIComponent(start) + ',' + encodeURIComponent(end) +
                    '&sort=-check_time&pageSize=10&appends=createdBy', { credentials:'include', headers:_listHeaders });
                if (r.ok) {
                    var data = await r.json();
                    var recs = data.data || [];
                    var checkIn = null, checkOut = null, leaveRec = null;
                    for (var i = 0; i < recs.length; i++) {
                        var t = recs[i];
                        if (t.check_type === '上班' && !checkIn) checkIn = t;
                        if (t.check_type === '下班' && !checkOut) checkOut = t;
                        if ((t.check_type === '请假' || t.check_type === '出差') && !leaveRec) leaveRec = t;
                    }
                    attendState = {
                        checkIn: !!checkIn, checkOut: !!checkOut,
                        leaveRec: leaveRec,
                        leavePending: leaveRec && leaveRec.workflow_status === 'pending',
                        leaveLevel1: leaveRec && leaveRec.workflow_status === 'level1_approved',
                        leaveApproved: leaveRec && leaveRec.workflow_status === 'approved',
                        leaveRejected: leaveRec && leaveRec.workflow_status === 'rejected'
                    };
                    var st = document.getElementById('attendStatus');
                    var btn = document.getElementById('attendBtn');
                    if (leaveRec && (leaveRec.workflow_status === 'pending' || leaveRec.workflow_status === 'level1_approved')) {
                        var label = leaveRec.check_type === '请假' ? '请假' : '出差';
                        st.textContent = '⏳' + label + '待审批'; st.className = 'attend-status pending';
                        btn.textContent = '⏳' + label + '审批中'; btn.className = 'attend-btn pending';
                    } else if (leaveRec && leaveRec.workflow_status === 'approved') {
                        var label2 = leaveRec.check_type === '请假' ? '已请假' : '已出差';
                        st.textContent = '✅' + label2; st.className = 'attend-status approved';
                        btn.textContent = label2; btn.className = 'attend-btn checked';
                    } else if (leaveRec && leaveRec.workflow_status === 'rejected') {
                        var label3 = leaveRec.check_type === '请假' ? '请假' : '出差';
                        st.textContent = '❌' + label3 + '被驳回'; st.className = 'attend-status rejected';
                        btn.textContent = label3 + '被驳回，点击重试'; btn.className = 'attend-btn';
                    } else if (checkOut) {
                        st.textContent = '已下班'; st.className = 'attend-status out';
                        btn.textContent = '已打卡'; btn.className = 'attend-btn checked';
                    } else if (checkIn) {
                        st.textContent = '已上班'; st.className = 'attend-status';
                        btn.textContent = '下班'; btn.className = 'attend-btn';
                    } else {
                        st.textContent = '未上班'; st.className = 'attend-status out';
                        btn.textContent = '上班'; btn.className = 'attend-btn';
                    }
                }
            } catch(e) { console.error('fetchAttendance error:', e); }
        }

        (function(){
            var wrap = document.querySelector('.stage-frame-wrap');

            var shim = document.createElement('div');
            shim.id = 'wheelShim';
            shim.style.cssText = 'position:absolute;inset:0;z-index:5;background:transparent;';
            // Insert before iframe, after toolbar (toolbar z-index:10)
            var frame = wrap.querySelector('iframe');
            if (frame) wrap.insertBefore(shim, frame);
            // Capture wheel -> scroll page
            shim.addEventListener('wheel', function(e) {
                e.preventDefault();
                window.scrollBy({top: e.deltaY, behavior: 'auto'});
            }, {passive: false});
            // Allow clicks through: briefly disable shim on interaction
            shim.addEventListener('mousedown', function() {
                shim.style.pointerEvents = 'none';
                clearTimeout(shim._timer);
                shim._timer = setTimeout(function(){ shim.style.pointerEvents = 'auto'; }, 300);
            });
            shim.addEventListener('mouseup', function() {
                clearTimeout(shim._timer);
                shim._timer = setTimeout(function(){ shim.style.pointerEvents = 'auto'; }, 300);
            });
        })();

        function dismissWarning() {

        function setWarning(hit, cityName) {
            if (!hit) { dismissWarning(); return; }
            const m = (hit.headline || hit.title || '').match(/发布(.+?)信号/);
            warnText = m ? m[1] : (hit.headline || hit.title || cityName + ' 气象预警');
            document.querySelector('.clock-panel').classList.add('warning-active');
            document.querySelector('#warnDisplay .label-warn').textContent = '⚠ ' + warnText;
            document.querySelector('#warnMarquee').innerHTML = '<span>⚠ ' + warnText + ' ⚠ ' + warnText + '</span>';
            document.querySelector('#warnMarquee').classList.add('active');
        }

        // GPS 缓存：首次定位后不再重复获取，每 1 小时重定位一次
        var _cachedLat = null, _cachedLng = null, _cachedCity = '';
        var _lastGpsTime = 0;
        var GPS_CACHE_MS = 3600000;

        function fetchWeather() {
            var DEFAULT_CITY = '遵义';

            function fetchQwWeather(city, lat, lng) {
                setWarning(null);
                var url = lat && lng
                    ? '/api/__pd__/weather-qw?lat=' + lat + '&lng=' + lng
                    : '/api/__pd__/weather-qw?city=' + encodeURIComponent(city);
                fetch(url)
                    .then(function(r){ if (!r.ok) throw new Error(); return r.json(); })
                    .then(function(d){
                        if (d.code !== 0 || !d.data) { weatherText = '获取失败'; return; }
                        if (!locationText || locationText === '定位中…') {
                            locationText = _weatherDisplayLoc || d.data.city || city || '';
                        }
                        weatherText = d.data.weather || '--';
                        tempText = d.data.temperature ? d.data.temperature + '℃' : '--℃';
                    })
                    .catch(function(){ weatherText = '获取失败'; });
            }

            // 有缓存且未过期 → 跳过 GPS，只用缓存坐标查天气
            if (_cachedLat && _cachedLng && Date.now() - _lastGpsTime < GPS_CACHE_MS) {
                fetchQwWeather(_cachedCity || DEFAULT_CITY, _cachedLat, _cachedLng);
                return;
            }

            // 无缓存或过期 → 全量定位
            var _weatherDisplayLoc = '';

            var _fetchWeatherByCoords = function(lat, lng) {
                _weatherDisplayLoc = '';
                locationText = '定位中…';
                var tryAmap = function() {
                    fetch('/peopledynamic/reverse-geocode?lat=' + lat + '&lng=' + lng)
                        .then(function(r){ if (!r.ok) throw new Error(); return r.json(); })
                        .then(function(d){
                            if (d.status === '1' && d.address) {
                                var addr = d.address;
                                var dist = addr.district || '';
                                _weatherDisplayLoc = dist;
                                locationText = dist;
                                _cachedLat = lat; _cachedLng = lng; _cachedCity = addr.city || DEFAULT_CITY; _lastGpsTime = Date.now();
                                fetchQwWeather(_cachedCity, lat, lng);
                            } else { throw new Error(); }
                        })
                        .catch(function(){ fetchByIP(); });
                };
                fetch('/api/__pd__/reverse-geocode-qw?lat=' + lat + '&lng=' + lng)
                    .then(function(r){ if (!r.ok) throw new Error(); return r.json(); })
                    .then(function(d){
                        if (d.status === '1' && d.address && d.address.name) {
                            var addr = d.address;
                            var name = addr.name || '';
                            var district = addr.district || '';
                            _weatherDisplayLoc = name;
                            locationText = name + (district && name !== district ? ' · ' + district : '');
                            _cachedLat = lat; _cachedLng = lng; _cachedCity = addr.city || DEFAULT_CITY; _lastGpsTime = Date.now();
                            fetchQwWeather(_cachedCity, lat, lng);
                        } else { throw new Error(); }
                    })
                    .catch(function(){ tryAmap(); });
            };

            function fetchByIP() {
                fetch('/peopledynamic/locate')
                    .then(function(r){ return r.json(); })
                    .then(function(d){
                        var raw = d && d.city;
                        var city = (Array.isArray(raw) ? raw[0] : raw) || DEFAULT_CITY;
                        locationText = city;
                        _cachedCity = city; _lastGpsTime = Date.now();
                        fetchQwWeather(city);
                    })
                    .catch(function(){ fetchQwWeather(DEFAULT_CITY); });
            }

            if (_isCapacitor && Capacitor.Plugins && Capacitor.Plugins.Geolocation) {
                Capacitor.Plugins.Geolocation.getCurrentPosition({ enableHighAccuracy: true, timeout: 6000 })
                    .then(function(pos){ _fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude); })
                    .catch(function(){ fetchByIP(); });
            } else if (_isHarmony && window.appBridge.getLocation) {
                window.appBridge.getLocation(
                    function(lat, lng){ _fetchWeatherByCoords(lat, lng); },
                    function(){ fetchByIP(); }
                );
            } else if (navigator.geolocation) {
                var timer = setTimeout(function(){ fetchByIP(); }, 6000);
                navigator.geolocation.getCurrentPosition(
                    function(pos){ clearTimeout(timer); _fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude); },
                    function(){ clearTimeout(timer); fetchByIP(); },
                    { enableHighAccuracy: true, timeout: 6000, maximumAge: 300000 }
                );
            } else {
                fetchByIP();
            }
        }

        function updateDisplay() {
            const n=new Date();
            const y=n.getFullYear(), mo=String(n.getMonth()+1).padStart(2,'0'), d=String(n.getDate()).padStart(2,'0');
            const h=String(n.getHours()).padStart(2,'0'), mi=String(n.getMinutes()).padStart(2,'0'), sc=String(n.getSeconds()).padStart(2,'0');
            var _e1=document.getElementById('clockHour');if(_e1)_e1.textContent=h;
            var _e2=document.getElementById('clockMin');if(_e2)_e2.textContent=mi;
            document.querySelector('#dateDisplay .label-date').textContent=`${y}年${mo}月${d}日`;
            const lu=getLunarDate(n);
            document.querySelector('#lunarDisplay .label-lunar').textContent=`农历${lu.month}月${lu.day}`;
            const t=getSolarTerm(n.getMonth()+1,n.getDate());
            var termEl=document.getElementById('termDisplay');if(!termEl)return;
            if (t) {
                termEl.querySelector('.label-term').textContent=t;
                termEl.style.display='';
            } else {
                termEl.querySelector('.label-term').textContent='';
                termEl.style.display='none';
            }
            rebuildCycleIds();
            document.querySelector('#weekdayDisplay .label-week').textContent=weekdays[n.getDay()];
            document.querySelector('#weatherDisplay .label-weather').textContent=weatherText;
            document.querySelector('#tempDisplay .label-temp').textContent=tempText;
            document.querySelector('#locationDisplay .label-location').textContent=locationText;
        }

        function updateUptime() {
            const s=new Date('2026-05-22T00:00:00');
            const n=new Date();
            const df=n-s;
            var _upEl=document.getElementById('uptime');if(!_upEl)return;_upEl.textContent=`${Math.floor(df/86400000)}天 ${Math.floor((df%86400000)/3600000)}小时`;
        }

        // 从 localStorage 复制 token 到 cookie（供 nginx auth_request 使用）
        (function(){
            try {
                var v = localStorage.getItem("NOCOBASE_TOKEN") || localStorage.getItem("nocobase_token");

        try{setInterval(updateUptime,60000);}catch(e){console.warn('[b]upInt',e)}
        try{setInterval(rotateCycle,3000);}catch(e){console.warn('[b]cycleInt',e)}
        function scheduleWeatherRefresh() {
            var h = new Date().getHours();
            var interval = h >= 6 && h < 22 ? 1800000 : 7200000;
            clearInterval(window._weatherTimer);
            window._weatherTimer = setInterval(fetchWeather, interval);

                <input type="file" id="cameraFileInput" accept="image/*" capture="environment" style="display:none">
                <div class="attend-finger-row">
                    <span class="label">🔐 本机验证</span>
                    <span class="attend-finger-status unavailable" id="fingerStatus">检测中...</span>
                    <button class="attend-finger-btn" id="fingerBtn" disabled onclick="verifyFingerprint()">本机指纹</button>
                </div>
            </div>
            <!-- 请假/出差区域 -->
            <div class="attend-leave-section" id="attendLeaveSection">
                <div class="date-row">
                    <div class="date-field">
                        <label>开始日期</label>
                        <input type="date" id="leaveStartDate">
                    </div>
                    <div class="date-field">
                        <label>结束日期</label>
                        <input type="date" id="leaveEndDate">
                    </div>
                </div>
                <textarea id="leaveReason" placeholder="请输入事由说明..."></textarea>
            </div>
            <!-- 请假/出差提交后状态 -->
            <div class="attend-leave-status" id="attendLeaveStatus"></div>
            <!-- 验证状态栏 -->
            <div class="attend-verify-bar" id="verifyBar" style="display:none">
                <div class="v-item" id="vGps">📍 定位</div>
                <div class="v-item" id="vFence">📍 围栏</div>
                <div class="v-item" id="vFace">📷 人脸</div>
                <div class="v-item" id="vFinger">🔐 指纹</div>
            </div>
            <button class="attend-submit" id="attendSubmit" disabled onclick="submitAttendance()">
                确认打卡
            </button>
            <div class="attend-location-status getting" id="locationStatus" data-base="正在获取位置...">正在获取位置...</div>
            <div class="attend-manual-location" id="manualLocationSection" style="display:none;margin-top:6px">
                <input type="text" id="manualLocationInput" placeholder="输入位置描述或坐标（如：公司A栋3楼）" style="width:100%;padding:6px 10px;border-radius:6px;border:1px solid #334;background:#1a2332;color:#e0e6ed;font-size:0.85em">
                <button class="attend-manual-loc-btn" id="manualLocationBtn" onclick="confirmManualLocation()" style="margin-top:4px;padding:4px 12px;border-radius:6px;border:1px solid #00d4ff;background:transparent;color:#00d4ff;font-size:0.82em;cursor:pointer">✓ 确认位置</button>
            </div>

            <!-- 指纹确认框（嵌入） -->
            <div class="finger-confirm-overlay" id="fingerConfirmOverlay">
                <div class="finger-confirm-dialog">
                    <p>是否使用本机设备完成验证？</p>
                    <div class="device-id" id="fingerDeviceId">--</div>
                    <div class="finger-confirm-btns">
                        <button class="btn-confirm" onclick="confirmFingerprint(true)">确定</button>
                        <button class="btn-cancel" onclick="confirmFingerprint(false)">取消</button>
                    </div>
                </div>
            </div>
            <span id="attendLocation" style="display:none"></span>
        </div>
    </div>

</body>
</html>
