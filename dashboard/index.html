<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州遵大数智化平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c1426 0%, #1a2332 50%, #0d1926 100%);
            color: #e0e6ed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            max-width: 100%;
            margin: 0;
            padding: 10px 14px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 12px;
        }

        .logo-container { width: 20%; min-width: 180px; max-width: 220px; display: flex; justify-content: center; flex-shrink: 0; }

        .logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }

        .title-container { text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; }

        .header h1 {
            font-size: 2.1em; font-weight: 700; letter-spacing: 6px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .header .subtitle {
            color: #5a6a7a; font-size: 0.85em; margin-top: 6px; letter-spacing: 4px;
        }

        /* ---- 主舞台：大屏 + 左侧面板 ---- */
        .main-stage {
            width: 100%;
            margin-top: 2em;
            display: flex;
            gap: 14px;
            align-items: stretch;
        }

        /* 左侧面板：时间 + 待办 + 公告 + 打卡 —— 占 1/5 */
        .side-panel {
            flex: 0 0 20%;
            min-width: 180px;
            max-width: 220px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .side-panel .panel-card {
            flex: 1;
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.08), rgba(123, 44, 191, 0.03));
            border: 1px solid rgba(0, 212, 255, 0.18);
            border-radius: 12px;
            padding: 18px 16px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 时间模块 */
        .side-panel .clock-digits {
            font-size: 1.8em;
            font-family: 'Consolas', 'Courier New', monospace;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.6), 0 0 24px rgba(0, 212, 255, 0.2);
            letter-spacing: 1px;
            line-height: 1.2;
            margin-bottom: 0.5em;
        }

        .clock-digits .colon { display: inline-block; animation: blink 1s step-end infinite; }

        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

        .side-panel .info-cycle {
            height: 1.8em; overflow: hidden; position: relative; width: 100%; margin-top: auto;
        }

        .side-panel .cycle-item {
            position: absolute; width: 100%; left: 0; top: 0; text-align: center;
            opacity: 0; transform: translateY(10px); transition: all 0.4s ease;
            font-size: 0.9em; letter-spacing: 2px;
        }

        .side-panel .cycle-item.active { opacity: 1; transform: translateY(0); }

        .cycle-item .label-date { color: #e0e6ed; }
        .cycle-item .label-lunar { color: #7b2cbf; }
        .cycle-item .label-term  { color: #ffd93d; }
        .cycle-item .label-week  { color: #5a6a7a; }
        .cycle-item .label-weather { color: #00ff88; }
        .cycle-item .label-temp   { color: #ff6b6b; }

        /* 待办模块 */
        .todo-inner {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-inner .todo-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .todo-inner .todo-icon {
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1em; flex-shrink: 0;
        }

        .todo-inner .todo-icon.pending { background: rgba(0, 212, 255, 0.15); color: #00d4ff; }
        .todo-inner .todo-icon.notify  { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }

        .todo-inner .todo-info { flex: 1; }
        .todo-inner .todo-count {
            font-size: 1.6em; font-weight: 700; line-height: 1;
        }
        .todo-inner .todo-count.pending-count { color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        .todo-inner .todo-count.notify-count  { color: #ff6b6b; text-shadow: 0 0 10px rgba(255, 107, 107, 0.3); }
        .todo-inner .todo-label { font-size: 0.7em; color: #5a6a7a; margin-top: 1px; }

        /* 公司公告 */
        .announce-card { padding: 12px 14px 10px !important; align-items: stretch !important; }

        .announce-title {
            font-size: 0.78em; color: #ffd93d; margin-bottom: 6px; font-weight: 600;
            letter-spacing: 1px;
        }

        .announce-container {
            height: 188px;
            overflow: hidden;
            position: relative;
        }

        .announce-track {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .announce-track.scrolling {
            animation: scrollUp 40s linear infinite;
        }

        .announce-track.paused {
            animation-play-state: paused;
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .announce-item {
            font-size: 0.7em;
            color: #c8d0d8;
            padding: 5px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
            border-left: 2px solid rgba(255, 217, 61, 0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .announce-item .a-time {
            color: #5a6a7a;
            font-size: 0.85em;
            margin-right: 8px;
        }

        /* 考勤打卡 */
        .attend-card {
            align-items: center !important;
            padding: 14px 16px 16px !important;
            gap: 6px;
        }

        .attend-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .attend-label { font-size: 0.78em; color: #ffd93d; font-weight: 600; letter-spacing: 1px; }

        .attend-status {
            font-size: 0.65em; padding: 2px 8px; border-radius: 8px;
            background: rgba(0, 255, 136, 0.12); color: #00ff88;
        }
        .attend-status.out { background: rgba(255, 107, 107, 0.12); color: #ff6b6b; }

        .attend-btn {
            margin-top: 4px; width: 100%; padding: 8px 0; border: none; border-radius: 8px;
            font-size: 0.85em; font-weight: 600; letter-spacing: 2px; cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff; transition: all 0.3s;
        }
        .attend-btn:hover { filter: brightness(1.15); transform: scale(1.02); }
        .attend-btn:active { transform: scale(0.98); }
        .attend-btn.checked { background: linear-gradient(135deg, #ff6b6b, #b84d6b); }

        /* 百宝箱入口 */
        .toolbox-card {
            align-items: center !important;
            padding: 12px 16px !important;
            cursor: pointer;
            transition: all 0.3s;
        }
        .toolbox-card:hover {
            border-color: rgba(0, 212, 255, 0.5);
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.15), rgba(123, 44, 191, 0.08));
        }
        .toolbox-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            text-decoration: none;
            color: inherit;
        }
        .toolbox-icon { font-size: 1.2em; }
        .toolbox-label { font-size: 0.85em; color: #00d4ff; font-weight: 600; letter-spacing: 1px; }
        .toolbox-arrow { font-size: 0.9em; color: #5a6a7a; transition: transform 0.2s; }
        .toolbox-card:hover .toolbox-arrow { transform: translateX(3px); }

        /* 大屏 iframe 容器 —— 占 4/5 */
        .stage-frame-wrap {
            flex: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.2);
            background: #0a0e1a;
            aspect-ratio: 16 / 10;
            position: relative;
        }

        .stage-frame-wrap iframe {
            width: 100%; height: 100%; border: none; display: block;
        }
        /* 缩放控制条（仅全屏可见） */
        .zoom-bar {
            display: none; position: absolute; top: 10px; right: 60px; z-index: 20;
            background: rgba(0,0,0,0.65); border-radius: 8px; padding: 4px 6px;
            gap: 3px; align-items: center; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .zoom-btn {
            width: 28px; height: 28px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08); color: #e0e6ed; font-size: 0.85em;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-family: inherit; line-height: 1; transition: all 0.2s;
        }
        .zoom-btn:hover { background: rgba(0,212,255,0.2); border-color: rgba(0,212,255,0.5); }
        .zoom-pct {
            font-size: 0.7em; color: #aaa; min-width: 36px; text-align: center; display: inline-block;
        }
        /* 全屏下显示缩放条 + 允许缩放 */
        .stage-frame-wrap:fullscreen .zoom-bar,
        .stage-frame-wrap:-webkit-full-screen .zoom-bar,
        .stage-frame-wrap:-moz-full-screen .zoom-bar { display: flex; }
        .stage-frame-wrap:fullscreen,
        .stage-frame-wrap:-webkit-full-screen,
        .stage-frame-wrap:-moz-full-screen {
            aspect-ratio: auto; width: 100vw; height: 100vh; border-radius: 0;
        }
        .stage-frame-wrap:fullscreen iframe,
        .stage-frame-wrap:-webkit-full-screen iframe,
        .stage-frame-wrap:-moz-full-screen iframe {
            width: 100%; height: 100%; transition: none;
        }
        .stage-frame-wrap:fullscreen .stage-toolbar,
        .stage-frame-wrap:-webkit-full-screen .stage-toolbar,
        .stage-frame-wrap:-moz-full-screen .stage-toolbar {
            bottom: 0; padding: 12px 18px;
        }

        /* 全屏按钮 */
        .fs-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            background: rgba(0,0,0,0.55);
            color: #e0e6ed;
            font-size: 0.78em;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .fs-btn:hover {
            background: rgba(0,0,0,0.75);
            border-color: rgba(0, 212, 255, 0.6);
            color: #00d4ff;
        }

        /* 底部工具栏 */
        .stage-toolbar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            pointer-events: none;
        }

        .stage-toolbar > * { pointer-events: auto; }

        .st-left { display: flex; align-items: center; gap: 8px; }

        .st-btn {
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 5px;
            background: rgba(0,0,0,0.5);
            color: #e0e6ed;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            line-height: 1;
        }

        .st-btn:hover { background: rgba(0,0,0,0.75); border-color: rgba(0, 212, 255, 0.5); color: #00d4ff; }

        .st-label {
            font-size: 0.78em;
            color: rgba(255,255,255,0.8);
            min-width: 80px;
            text-align: center;
        }

        /* ---- 工作版块 ---- */
        .work-section { margin-top: 28px; }

        .section-header {
            font-size: 1.1em; color: #00d4ff; margin-bottom: 16px;
            padding-bottom: 8px; border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            display: flex; align-items: center; gap: 10px;
        }

        .section-header::before {
            content: ''; width: 4px; height: 18px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf); border-radius: 2px;
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
        }

        .work-group {
            border-radius: 10px; padding: 12px 10px 10px; border: 1px solid;
        }

        .work-group .group-title {
            font-size: 0.82em; font-weight: 600; margin-bottom: 8px;
            padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .work-group .btn-list { display: flex; flex-direction: column; gap: 4px; }

        .work-group .btn-item {
            display: inline-block; padding: 4px 8px; border-radius: 4px;
            font-size: 0.72em; text-decoration: none; border: 1px solid;
            cursor: pointer; transition: all 0.2s;
        }

        .work-group .btn-item:hover { filter: brightness(1.2); transform: translateX(3px); }

        /* ---- 底部 ---- */
        .footer {
            margin-top: 30px; padding: 18px; text-align: center;
            color: #5a6a7a; font-size: 0.82em;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
        }
        .footer a { color: #00d4ff; text-decoration: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .side-panel .panel-card, .work-group {
            animation: fadeIn 0.5s ease forwards;
        }

        @media (max-width: 768px) {
            .main-stage { flex-direction: column; width: 100%; }
            .side-panel {
                flex: unset; width: 100%;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 4px;
                width: 100%; min-width: 100%;
            }
            .side-panel .panel-card { flex: 1; padding: 10px 8px 8px; min-width: 0; width: auto; }
            .side-panel .panel-card:nth-child(3) { grid-column: auto; }
            .side-panel .panel-card:nth-child(4),
            .side-panel .panel-card:nth-child(5) { display: none; }
            .works-grid { grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 6px; }
            .header { flex-direction: column; gap: 6px; }
            .header h1 { font-size: 1.3em; }
            .logo { width: 36px; height: 36px; }
            .side-panel .clock-digits { font-size: 1.3em; margin-bottom: 0.3em; white-space: nowrap; }
            .info-cycle { height: 1.2em; }
            .cycle-item { font-size: 0.6em; }
            .todo-inner .todo-count { font-size: 1.1em; white-space: nowrap; }
            .todo-inner .todo-icon { width: 28px; height: 28px; font-size: 0.9em; }
            .announce-container { height: 80px; }
            .stage-frame-wrap { aspect-ratio: auto; min-height: 180px; }
            .footer span, .footer p br { display: none; }
            .footer-attend, .footer-toolbox { display: inline-block !important; padding: 4px 10px; border-radius: 4px; font-size: 0.85em; cursor: pointer; }
            .footer-attend { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.2); color: #00ff88; }
            .footer-toolbox { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); color: #00d4ff; text-decoration: none; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.1em; }
            .works-grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
        }

        /* === 打卡弹窗 === */
        .attend-overlay {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
        }
        .attend-overlay.show { display: flex; }
        .attend-drawer {
            background: linear-gradient(160deg, #111827 0%, #1a2332 100%);
            border: 1px solid rgba(0,212,255,0.25);
            border-radius: 16px; width: 92vw; max-width: 420px; max-height: 90vh;
            overflow-y: auto; padding: 24px 20px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
        .attend-drawer h3 {
            text-align: center; color: #00d4ff; font-size: 1.2em;
            margin-bottom: 16px; letter-spacing: 2px;
        }
        .attend-close {
            position: absolute; top: 10px; right: 14px; font-size: 1.2em;
            color: #888; cursor: pointer; background: none; border: none;
            width: 32px; height: 32px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
            line-height: 1; z-index: 5;
        }
        .attend-close:hover { color: #ff6b6b; }
        .attend-info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; border-radius: 8px; margin-bottom: 10px;
            background: rgba(255,255,255,0.03); font-size: 0.78em;
        }
        .attend-info-row .label { color: #5a6a7a; }
        .attend-info-row .value { color: #e0e6ed; font-weight: 500; }
        .attend-camera-wrap {
            position: relative; border-radius: 12px; overflow: hidden;
            background: #000; aspect-ratio: 4/3; margin-bottom: 12px;
            border: 2px solid rgba(0,212,255,0.15);
        }
        .attend-camera-wrap video, .attend-camera-wrap canvas {
            width: 100%; height: 100%; object-fit: cover;
        }
        .attend-camera-wrap canvas { position: absolute; top: 0; left: 0; }
        .attend-camera-wrap .face-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 140px; height: 170px; border: 2px dashed rgba(0,255,136,0.6);
            border-radius: 50% / 40%; pointer-events: none;
        }
        .attend-camera-wrap .face-indicator.verified { border-color: #00ff88; border-style: solid; }
        .attend-camera-wrap .face-indicator.unverified { border-color: #ff6b6b; }
        .attend-camera-wrap .face-status {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            padding: 4px 12px; border-radius: 10px; font-size: 0.7em;
            background: rgba(0,0,0,0.6); color: #ffd93d;
        }
        .attend-camera-wrap .face-status.verified { color: #00ff88; }
        .attend-camera-wrap .face-status.unverified { color: #ff6b6b; }
        .attend-capture-btn {
            display: block; width: 100%; padding: 10px; border-radius: 8px;
            border: 1px solid rgba(0,212,255,0.3); background: rgba(0,212,255,0.1);
            color: #00d4ff; font-size: 0.9em; cursor: pointer; margin-bottom: 12px;
            transition: all 0.2s; font-family: inherit;
        }
        .attend-capture-btn:hover { background: rgba(0,212,255,0.2); }
        .attend-capture-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .attend-submit {
            display: block; width: 100%; padding: 12px; border-radius: 10px;
            border: none; font-size: 1em; font-weight: 600; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s; font-family: inherit;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf); color: #fff;
        }
        
        .attend-finger-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
            padding: 10px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.02); font-size: 0.78em;
        }
        .attend-finger-row .label { color: #5a6a7a; }
        .attend-finger-btn {
            margin-left: auto; padding: 6px 14px; border-radius: 6px;
            border: 1px solid rgba(123,44,191,0.4); background: rgba(123,44,191,0.1);
            color: #b06fff; font-size: 0.85em; cursor: pointer; font-family: inherit;
            transition: all 0.2s; white-space: nowrap;
        }
        .attend-finger-btn:hover { background: rgba(123,44,191,0.2); }
        .attend-finger-btn.verified { border-color: #00ff88; background: rgba(0,255,136,0.1); color: #00ff88; }
        .attend-finger-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .attend-finger-status { font-size: 0.85em; }
        .attend-finger-status.verified { color: #00ff88; }
        .attend-finger-status.unavailable { color: #5a6a7a; }
        .attend-verify-bar {
            display: flex; gap: 6px; margin-bottom: 10px; font-size: 0.7em;
        }
        .attend-verify-bar .v-item {
            flex: 1; text-align: center; padding: 4px 0; border-radius: 4px;
            background: rgba(255,255,255,0.03); color: #5a6a7a;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .attend-verify-bar .v-item.ok {
            background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.3); color: #00ff88;
        }
        .attend-verify-bar .v-item.fail {
            background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.3); color: #ff6b6b;
        }
        .attend-verify-bar .v-item.need {
            background: rgba(255,217,61,0.08); border-color: rgba(255,217,61,0.3); color: #ffd93d;
            animation: pulse 1.5s ease infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .camera-retry-btn {
            display: none; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,107,107,0.3);
            background: rgba(255,107,107,0.08); color: #ff6b6b;
            font-size: 0.85em; cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .camera-retry-btn:hover { background: rgba(255,107,107,0.15); }

        var _cameraResLevel = 0;
        var _cameraResolutions = [
            {width:{ideal:1280},height:{ideal:720}},
            {width:{ideal:640},height:{ideal:480}},
            {width:{ideal:320},height:{ideal:240}}
        ];
        function startCamera() {
            var v = document.getElementById('attendVideo');
            var retryBtn = document.getElementById('cameraRetryBtn');
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                document.getElementById('faceStatus').textContent = '⚠ 浏览器不支持相机，可跳过拍照直接打卡';
                document.getElementById('faceStatus').className = 'face-status';
                document.getElementById('captureBtn').disabled = true;
                document.getElementById('cameraSwitchBtn').disabled = true;
                return;
            }
            _cameraResLevel = 0;
            _tryCamera(v, retryBtn);
        }

        function _showCameraHelp() {
            var s = document.getElementById('faceStatus');
            if (_isMobile) {
                s.innerHTML = '⚠ 相机不可用：浏览器相机权限未允许，请在浏览器设置中开启相机后重试';
            } else {
                s.innerHTML = '⚠ 相机不可用，请在浏览器网站设置中允许摄像头权限后重试';
            }
            s.className = 'face-status unverified';
        }

        function _tryCamera(v, retryBtn) {
            if (_cameraResLevel >= _cameraResolutions.length) {
                _showCameraHelp();
                document.getElementById('captureBtn').disabled = true;
                document.getElementById('cameraSwitchBtn').disabled = true;
                if (retryBtn) retryBtn.style.display = 'block';
                return;
            }
            var res = _cameraResolutions[_cameraResLevel];
            var constraints = {video:Object.assign({}, res, {facingMode:_cameraFacingMode}), audio:false};
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream){
                    cameraStream = stream;
                    v.srcObject = stream;
                    v.style.display = 'block';
                    v.setAttribute('playsinline', '');
                    v.setAttribute('muted', '');
                    document.getElementById('captureBtn').disabled = false;
                    document.getElementById('cameraSwitchBtn').disabled = false;
                    document.getElementById('faceStatus').textContent = '📷 请拍摄人脸';
                    document.getElementById('faceStatus').className = 'face-status';
                    if (retryBtn) retryBtn.style.display = 'none';
                })
                .catch(function(err){
                    if (_cameraResLevel === 0 && err.name === 'NotAllowedError') {
                        _showCameraHelp();
                        document.getElementById('captureBtn').disabled = true;
                        document.getElementById('cameraSwitchBtn').disabled = true;
                        if (retryBtn) retryBtn.style.display = 'block';
                        return;
                    }
                    _cameraResLevel++;
                    _tryCamera(v, retryBtn);
                });
        }

        function _getLocationOnce(highAccuracy) {
            navigator.geolocation.getCurrentPosition(
                function(pos){
                    attendLocation = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    };
                    gpsState = 'ok';
                    var acc = Math.round(pos.coords.accuracy);
                    var accLabel = '';
                    if (acc < 5) accLabel = '（高精度）';
                    else if (acc < 50) accLabel = '（一般）';
                    else accLabel = '（精度低）';
                    attendLocationText = pos.coords.latitude.toFixed(5) + ',' + pos.coords.longitude.toFixed(5) + ' ±' + acc + 'm ' + accLabel;
                    document.getElementById('attendLocation').textContent = attendLocationText;
                    document.getElementById('locationStatus').innerHTML = '✓ 位置已获取';
                    document.getElementById('locationStatus').className = 'attend-location-status got';
                    if (attendType === '请假' || attendType === '出差') {
                        // Keep optional status
                    }
                    updateSubmitState();
                },
                function(err){
                    if (highAccuracy && (err.code === 2 || err.code === 3) && !_gpsRetried) {
                        _gpsRetried = true;
                        document.getElementById('attendLocation').innerHTML = '降级定位中...';
                        _getLocationOnce(false);
                        return;
                    }
                    attendLocation = null;
                    gpsState = 'fail';
                    var msg = '获取失败';
                    if (err.code === 1) msg = '权限被拒绝';
                    else if (err.code === 2) msg = '位置不可用';
                    else if (err.code === 3) msg = '获取超时';
                    document.getElementById('attendLocation').innerHTML = msg + ' <a href="javascript:void(0)" onclick="getLocation()" style="color:#00d4ff;font-size:0.82em">重试</a>';
                    _showGpsHelp();
                    updateSubmitState();
                },
                {enableHighAccuracy:highAccuracy, timeout:15000, maximumAge:5000}
            );
        }

        function capturePhoto() {
            var v = document.getElementById('attendVideo');

        async function detectFace(canvas) {
            document.getElementById('faceStatus').textContent = '🔍 检测人脸中...';
            document.getElementById('faceStatus').className = 'face-status';
            faceDetected = false;
            // Brightness check
            try {
                var ctx = canvas.getContext('2d');
                var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                var pixels = imageData.data;
                var total = 0;
                for (var k = 0; k < pixels.length; k += 4) {
                    total += 0.299 * pixels[k] + 0.587 * pixels[k+1] + 0.114 * pixels[k+2];
                }
                var avgBrightness = total / (pixels.length / 4);
                if (avgBrightness < 40) {
                    document.getElementById('faceStatus').textContent = '⚠ 环境过暗，建议补光后重拍';
                    document.getElementById('faceStatus').className = 'face-status unverified';
                    updateSubmitState();
                    return;
                }
            } catch(e) {}
            // FaceDetector API
            if (typeof FaceDetector !== 'undefined') {
                try {
                    var detector = new FaceDetector({fastMode:true});
                    var faces = await detector.detect(canvas);
                    if (faces.length > 0) {
                        faceDetected = true;
                        document.getElementById('faceStatus').textContent = '✓ 已检测到人脸 (' + faces.length + '人)';
                        document.getElementById('faceStatus').className = 'face-status verified';
                        document.getElementById('faceIndicator').className = 'face-indicator verified';
                        // Draw face boxes
                        var ctx = canvas.getContext('2d');
                        ctx.strokeStyle = '#00ff88';
                        ctx.lineWidth = 3;
                        for (var f = 0; f < faces.length; f++) {
                            var box = faces[f].boundingBox;
                            ctx.strokeRect(box.x, box.y, box.width, box.height);
                        }
                    } else {
                        document.getElementById('faceStatus').textContent = '⚠ 未检测到人脸，请重新拍摄';
                        document.getElementById('faceStatus').className = 'face-status unverified';
                        document.getElementById('faceIndicator').className = 'face-indicator unverified';
                    }
                } catch(e) {
                    document.getElementById('faceStatus').textContent = '⚠ 人脸检测不可用，已拍摄照片';
                    document.getElementById('faceStatus').className = 'face-status';
                    faceDetected = null;
                }
            } else {
                document.getElementById('faceStatus').textContent = 'ℹ 浏览器不支持人脸检测，已拍摄照片';
                document.getElementById('faceStatus').className = 'face-status';
                faceDetected = null;
            }
            updateSubmitState();
        }

            else { vFinger.className = 'v-item need'; vFinger.textContent = '🔐 指纹 ○'; }

            if (gpsState === 'ok') {

                } else {
                    btn.disabled = true;
                    btn.textContent = '请完成拍照或指纹验证';
                }
            } else {
                if (faceOk && fingerOk) {
                    btn.disabled = false;
                    btn.textContent = '确认打卡（GPS异常，双因子验证）';
                } else {
                    btn.disabled = true;
                    var missing = [];
                    if (!faceOk) missing.push('拍照');
                    if (!fingerOk) missing.push('指纹');
                    btn.textContent = 'GPS异常，需完成：' + missing.join('+');
                }
            }
        }

        // Fingerprint with custom confirm dialog
        async function verifyFingerprint() {
            var s = document.getElementById('fingerStatus');
            var b = document.getElementById('fingerBtn');
            b.disabled = true;
            b.textContent = '验证中...';
            _fingerVerified = false;
            _deviceFp = null;

            // Build enhanced device fingerprint
            var fpData = navigator.userAgent + '|' + screen.width + 'x' + screen.height + '|' +
                         (navigator.hardwareConcurrency||'') + '|' + (navigator.deviceMemory||'') + '|' +
                         Intl.DateTimeFormat().resolvedOptions().timeZone + '|' +
                         (navigator.languages||[]).join(',') + '|' +
                         (navigator.plugins ? navigator.plugins.length : '0');

            // Try SHA-256 via SubtleCrypto
            try {
                var enc = new TextEncoder();
                var hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(fpData));
                var hashArr = Array.from(new Uint8Array(hashBuf));
                var hex = hashArr.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
                _deviceFp = 'dev_' + hex.substring(0, 16);
            } catch(e) {
                // Fallback to DJB2
                var fpHash = 0;
                for (var i = 0; i < fpData.length; i++) { fpHash = ((fpHash << 5) - fpHash) + fpData.charCodeAt(i); fpHash |= 0; }
                _deviceFp = 'dev_' + Math.abs(fpHash).toString(36);
            }

            // Check localStorage for quick re-verify
            var stored = localStorage.getItem('_attendDeviceId');
            if (stored === _deviceFp) {
                _fingerVerified = true;
                _fingerVerifiedAt = Date.now();
                s.textContent = '✓ 本机已验证（快速）';
                s.className = 'attend-finger-status verified';
                b.textContent = '✓ 已验证';
                b.className = 'attend-finger-btn verified';
                updateSubmitState();
                return;
            }

            // Show custom confirm dialog
            b.textContent = '请确认';
            document.getElementById('fingerDeviceId').textContent = _deviceFp.substring(0, 16) + '...';
            document.getElementById('fingerConfirmOverlay').classList.add('visible');
        }

        function confirmFingerprint(confirmed) {
            document.getElementById('fingerConfirmOverlay').classList.remove('visible');
            var s = document.getElementById('fingerStatus');
            var b = document.getElementById('fingerBtn');
            if (confirmed) {
                _fingerVerified = true;
                _fingerVerifiedAt = Date.now();
                s.textContent = '✓ 本机设备已验证';
                s.className = 'attend-finger-status verified';
                b.textContent = '✓ 已验证';
                b.className = 'attend-finger-btn verified';
                localStorage.setItem('_attendDeviceId', _deviceFp);
            } else {
                s.textContent = '验证已取消';
                s.className = 'attend-finger-status unavailable';
                b.textContent = '重试';
                b.disabled = false;
                b.className = 'attend-finger-btn';
            }
            updateSubmitState();
        }

        async function computePhotoHash(dataUrl) {
            var hashInput = dataUrl.substring(dataUrl.length - 500);
            try {
                var enc = new TextEncoder();
                var hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(hashInput));
                var hashArr = Array.from(new Uint8Array(hashBuf));
                var hex = hashArr.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
                return 'ph_' + hex.substring(0, 8);
            } catch(e) {
                var hashVal = 0;
                for (var i = 0; i < hashInput.length; i++) { hashVal = ((hashVal << 5) - hashVal) + hashInput.charCodeAt(i); hashVal |= 0; }
                return 'ph_' + Math.abs(hashVal).toString(16);
            }
        }

        async function submitAttendance() {
            var btn = document.getElementById('attendSubmit');
            btn.disabled = true;
            btn.textContent = '提交中...';
            try {
                var now = new Date();
                var isLeave = (attendType === '请假' || attendType === '出差');
                var body = {
                    check_type: attendType,
                    check_time: now.toISOString(),
                    gps_state: gpsState
                };

                // Location (always include if available)
                if (attendLocation) {
                    body.latitude = attendLocation.lat;
                    body.longitude = attendLocation.lng;
                    body.gps_accuracy = Math.round(attendLocation.accuracy);
                }

                if (isLeave) {
                    // Leave/travel submission
                    body.reason = document.getElementById('leaveReason').value.trim();
                    var sd = document.getElementById('leaveStartDate').value;
                    var ed = document.getElementById('leaveEndDate').value;
                    if (sd && ed && sd > ed) {
                        btn.textContent = '✗ 开始日期不能晚于结束日期';
                        btn.disabled = false;
                        return;
                    }
                    body.start_date = sd || now.toISOString();
                    body.end_date = ed || now.toISOString();
                    body.workflow_status = 'pending';
                    body.verify_status = 'leave_auto';
                } else {
                    // Normal check-in/out
                    var methods = [];
                    if (gpsState === 'ok') methods.push('gps');
                    if (faceDetected === true) methods.push('face');
                    else if (faceDetected === false) methods.push('face_fail');
                    else if (attendPhoto) methods.push('photo_only');
                    if (_fingerVerified) methods.push('finger');
                    body.verify_status = methods.join('+');

                    var reasons = [];
                    if (gpsState !== 'ok') reasons.push('GPS定位异常');
                    if (!faceDetected && attendPhoto) reasons.push('人脸检测失败');
                    if (!_fingerVerified && gpsState !== 'ok') reasons.push('未完成双因子验证');
                    body.anomaly_reason = reasons.join('; ') || null;

                    if (_deviceFp && _fingerVerified) {
                        body.device_fingerprint = _deviceFp;
                    }
                    if (_fingerVerifiedAt) {
                        body.fingerprint_verified_at = new Date(_fingerVerifiedAt).toISOString();
                    }
                    // Photo hash (always)
                    if (attendPhoto) {
                        body.photo_hash = await computePhotoHash(attendPhoto);
                    }
                    // Conditionally upload full photo when GPS failed
                    if (attendPhoto && gpsState !== 'ok') {
                        body.photo = attendPhoto;
                    }
                    // Fallback device fingerprint
                    if (!body.device_fingerprint) {
                        body.device_fingerprint = navigator.userAgent.substring(0, 200) + '|' + screen.width + 'x' + screen.height;
                    }
                }

                var r = await fetch('/api/attendance_records:create', {
                    method: 'POST', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (r.ok) {
                    if (isLeave) {
                        btn.textContent = '✅ 已提交，等待审批';
                        btn.style.background = 'linear-gradient(135deg, #ffd93d, #f39c12)';
                        btn.disabled = true;
                        document.getElementById('attendLeaveStatus').textContent = '✅ 已提交审批申请，请等待审批人处理';
                        document.getElementById('attendLeaveStatus').className = 'attend-leave-status pending';
                    } else {
                        btn.textContent = '✓ 打卡成功！';
                        btn.style.background = 'linear-gradient(135deg, #00ff88, #00b86b)';
                        setTimeout(closeAttendModal, 1200);
                    }
                    fetchAttendance();
                } else {
                    var errData = await r.json().catch(function(){return {};});
                    btn.textContent = '✗ 失败，重试';
                    btn.disabled = false;
                    console.error('Attendance failed:', errData);
                }
            } catch(e) {
                btn.textContent = '✗ 网络错误，重试';
                btn.disabled = false;
                console.error('Attendance error:', e);
            }
        }

                    if (e.target === ov) closeAttendModal();
                });
            }
            var reasonInput = document.getElementById('leaveReason');
            if (reasonInput) {
                reasonInput.addEventListener('input', function(){
                    if (attendType === '请假' || attendType === '出差') {
                        document.getElementById('attendSubmit').disabled = this.value.trim().length === 0;
                    }
                });
            }
        });



        // Fetch current day status for display
        let attendState = null;
        async function fetchAttendance() {
            try {
                var today = new Date();
                var start = new Date(today.getFullYear(), today.getMonth(), today.getDate()).toISOString();
                var end = new Date(today.getFullYear(), today.getMonth(), today.getDate()+1).toISOString();
                var r = await fetch('/api/attendance_records:list?filter[check_time][$dateBetween]=' +
                    encodeURIComponent(start) + ',' + encodeURIComponent(end) +
                    '&sort=-check_time&pageSize=10&appends=createdBy', { credentials:'include' });
                if (r.ok) {
                    var data = await r.json();
                    var recs = data.data || [];
                    var checkIn = null, checkOut = null, leaveRec = null;
                    for (var i = 0; i < recs.length; i++) {
                        var t = recs[i];
                        if (t.check_type === '签到' && !checkIn) checkIn = t;
                        if (t.check_type === '签退' && !checkOut) checkOut = t;
                        if ((t.check_type === '请假' || t.check_type === '出差') && !leaveRec) leaveRec = t;
                    }
                    attendState = {
                        checkIn: !!checkIn, checkOut: !!checkOut,
                        leaveRec: leaveRec,
                        leavePending: leaveRec && leaveRec.workflow_status === 'pending',
                        leaveLevel1: leaveRec && leaveRec.workflow_status === 'level1_approved',
                        leaveApproved: leaveRec && leaveRec.workflow_status === 'approved',
                        leaveRejected: leaveRec && leaveRec.workflow_status === 'rejected'
                    };
                    var st = document.getElementById('attendStatus');
                    var btn = document.getElementById('attendBtn');
                    if (leaveRec && (leaveRec.workflow_status === 'pending' || leaveRec.workflow_status === 'level1_approved')) {
                        var label = leaveRec.check_type === '请假' ? '请假' : '出差';
                        st.textContent = '⏳' + label + '待审批'; st.className = 'attend-status pending';
                        btn.textContent = '⏳' + label + '审批中'; btn.className = 'attend-btn pending';
                    } else if (leaveRec && leaveRec.workflow_status === 'approved') {
                        var label2 = leaveRec.check_type === '请假' ? '已请假' : '已出差';
                        st.textContent = '✅' + label2; st.className = 'attend-status approved';
                        btn.textContent = label2; btn.className = 'attend-btn checked';
                    } else if (leaveRec && leaveRec.workflow_status === 'rejected') {
                        var label3 = leaveRec.check_type === '请假' ? '请假' : '出差';
                        st.textContent = '❌' + label3 + '被驳回'; st.className = 'attend-status rejected';
                        btn.textContent = label3 + '被驳回，点击重试'; btn.className = 'attend-btn';
                    } else if (checkOut) {
                        st.textContent = '已签退'; st.className = 'attend-status out';
                        btn.textContent = '已打卡'; btn.className = 'attend-btn checked';
                    } else if (checkIn) {
                        st.textContent = '已签到'; st.className = 'attend-status';
                        btn.textContent = '签退'; btn.className = 'attend-btn';
                    } else {
                        st.textContent = '未签到'; st.className = 'attend-status out';
                        btn.textContent = '签到'; btn.className = 'attend-btn';
                    }
                }
            } catch(e) { console.error('fetchAttendance error:', e); }
        }

                // 全屏切换
        var _zoomScale = 1;
        function zoomFrame(delta, reset) {
            if (reset) _zoomScale = 1;
            else _zoomScale = Math.max(0.3, Math.min(3, _zoomScale + delta));
            var f = document.getElementById('externFrame');
            f.style.transform = 'scale(' + _zoomScale + ')';
            f.style.transformOrigin = 'center center';
            document.getElementById('zoomPct').textContent = Math.round(_zoomScale * 100) + '%';
        }
        function toggleFullscreen() {
            var wrap = document.querySelector('.stage-frame-wrap');
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                // Reset zoom on exit
                _zoomScale = 1;
                document.getElementById('externFrame').style.transform = '';
                document.getElementById('zoomPct').textContent = '100%';
            }
        }
        // Listen for fullscreen change to show/hide zoom bar
        document.addEventListener('fullscreenchange', function(){
            var fs = !!document.fullscreenElement;
            document.getElementById('zoomBar').style.display = fs ? 'flex' : 'none';
            var shim = document.getElementById('wheelShim');
            if (shim) shim.style.pointerEvents = fs ? 'none' : 'auto';
        });
        document.addEventListener('webkitfullscreenchange', function(){
            var fs = !!document.webkitFullscreenElement;
            document.getElementById('zoomBar').style.display = fs ? 'flex' : 'none';
            var shim = document.getElementById('wheelShim');
            if (shim) shim.style.pointerEvents = fs ? 'none' : 'auto';
        });

        // 透明遮罩截获滚轮，阻止iframe缩放，改为页面滚动
        (function(){
            var wrap = document.querySelector('.stage-frame-wrap');
            if (!wrap) return;
            var shim = document.createElement('div');
            shim.id = 'wheelShim';
            shim.style.cssText = 'position:absolute;inset:0;z-index:5;background:transparent;';
            // Insert before iframe, after toolbar (toolbar z-index:10)
            var frame = wrap.querySelector('iframe');
            if (frame) wrap.insertBefore(shim, frame);
            // Capture wheel -> scroll page
            shim.addEventListener('wheel', function(e) {
                e.preventDefault();
                window.scrollBy({top: e.deltaY, behavior: 'auto'});
            }, {passive: false});
            // Allow clicks through: briefly disable shim on interaction
            shim.addEventListener('mousedown', function() {
                shim.style.pointerEvents = 'none';
                clearTimeout(shim._timer);
                shim._timer = setTimeout(function(){ shim.style.pointerEvents = 'auto'; }, 300);
            });
            shim.addEventListener('mouseup', function() {
                clearTimeout(shim._timer);
                shim._timer = setTimeout(function(){ shim.style.pointerEvents = 'auto'; }, 300);
            });
        })();

        // 农历 / 节气 / 天气
        const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
        const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                          '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                          '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
        const solarTerms = ['小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨',
                           '立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑',
                           '白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'];
        const solarTermsDate = [
            [1,6],[1,20],[2,4],[2,19],[3,6],[3,21],[4,5],[4,20],
            [5,6],[5,21],[6,6],[6,21],[7,7],[7,23],[8,7],[8,23],
            [9,8],[9,23],[10,8],[10,23],[11,7],[11,22],[12,7],[12,22]
        ];
        const weatherCodes = {
            0:'晴',1:'晴',2:'多云',3:'阴',45:'雾',48:'雾',
            51:'毛毛雨',53:'毛毛雨',55:'毛毛雨',56:'冻雨',57:'冻雨',
            61:'小雨',63:'中雨',65:'大雨',66:'冻雨',67:'冻雨',
            71:'小雪',73:'中雪',75:'大雪',77:'雪粒',
            80:'阵雨',81:'阵雨',82:'阵雨',85:'阵雪',86:'阵雪',
            95:'雷暴',96:'雷暴',99:'雷暴'
        };
        const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

        function getSolarTerm(m,d) {
            for (let i=0;i<solarTermsDate.length;i++)
                if (solarTermsDate[i][0]===m && solarTermsDate[i][1]===d) return solarTerms[i];
            for (let i=0;i<solarTermsDate.length;i++) {
                const df=Math.abs(solarTermsDate[i][1]-d);
                if (solarTermsDate[i][0]===m && df<=1) return solarTerms[i]+'前后';
            }
            return '';
        }
        function getLunarDate(date) {
            const m=date.getMonth()+1, d=date.getDate();
            return { month: lunarMonths[(m+10)%12], day: lunarDays[(d+10)%30] };
        }

        let cycleIndex=0;
        const cycleIds=['dateDisplay','lunarDisplay','termDisplay','weekdayDisplay','weatherDisplay','tempDisplay'];
        function rotateCycle() {
            document.querySelectorAll('.cycle-item').forEach(e=>e.classList.remove('active'));
            document.getElementById(cycleIds[cycleIndex]).classList.add('active');
            cycleIndex=(cycleIndex+1)%cycleIds.length;
        }

        let weatherText='获取中…', tempText='--℃';
        function fetchWeather() {
            function doFetch(lat,lon){
                fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current_weather=true&timezone=Asia/Shanghai')
                    .then(r=>r.json())
                    .then(d=>{ if(d.current_weather){ weatherText=weatherCodes[d.current_weather.weathercode]||'未知'; tempText=d.current_weather.temperature+'℃'; } })
                    .catch(function(){ weatherText='--'; tempText='--℃'; });
            }
            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition(function(p){doFetch(p.coords.latitude,p.coords.longitude)},function(){doFetch(29.56,106.55)});
            } else {
                doFetch(29.56,106.55);
            }
        }

        function updateDisplay() {
            const n=new Date();
            const y=n.getFullYear(), mo=String(n.getMonth()+1).padStart(2,'0'), d=String(n.getDate()).padStart(2,'0');
            const h=String(n.getHours()).padStart(2,'0'), mi=String(n.getMinutes()).padStart(2,'0'), sc=String(n.getSeconds()).padStart(2,'0');
            document.getElementById('clockHour').textContent=h;
            document.getElementById('clockMin').textContent=mi;
            document.querySelector('#dateDisplay .label-date').textContent=`${y}年${mo}月${d}日`;
            const lu=getLunarDate(n);
            document.querySelector('#lunarDisplay .label-lunar').textContent=`农历${lu.month}月${lu.day}`;
            const t=getSolarTerm(n.getMonth()+1,n.getDate());
            document.querySelector('#termDisplay .label-term').textContent=t||'无节气';
            document.querySelector('#weekdayDisplay .label-week').textContent=weekdays[n.getDay()];
            document.querySelector('#weatherDisplay .label-weather').textContent=weatherText;
            document.querySelector('#tempDisplay .label-temp').textContent=tempText;
        }

        function updateUptime() {
            const s=new Date('2026-05-22T00:00:00');
            const n=new Date();
            const df=n-s;
            document.getElementById('uptime').textContent=`${Math.floor(df/86400000)}天 ${Math.floor((df%86400000)/3600000)}小时`;
        }

        // 从 localStorage 复制 token 到 cookie（供 nginx auth_request 使用）
        (function(){
            try {
                var v = localStorage.getItem("NOCOBASE_TOKEN") || localStorage.getItem("nocobase_token");
                if (v && v.length > 20 && document.cookie.indexOf("nb_token=") < 0) {
                    document.cookie = "nb_token=" + v + ";path=/;max-age=3600;SameSite=Lax";
                }
            } catch(e){}
        })();

        loadSource(0);
        checkAdmin();
        fetchTodos();
        fetchAnnouncements();
        fetchAttendance();
        fetchWeather();
        updateDisplay();
        updateUptime();
        rotateCycle();
        setInterval(updateDisplay,1000);
        setInterval(updateUptime,60000);
        setInterval(rotateCycle,3000);
        setInterval(fetchWeather,600000);
    </script>

    <!-- 打卡弹窗 -->
    <div class="attend-overlay" id="attendOverlay">
        <div class="attend-drawer">
            <button class="attend-close" onclick="closeAttendModal()" title="关闭">✕</button>
            <h3>📸 考勤打卡</h3>
            <div class="attend-type-tabs" id="attendTypeTabs">
                <div class="attend-type-tab selected" data-type="签到" onclick="onAttendTypeChange('签到',this)">✅ 签到</div>
                <div class="attend-type-tab" data-type="签退" onclick="onAttendTypeChange('签退',this)">🏠 签退</div>
                <div class="attend-type-tab" data-type="请假" onclick="onAttendTypeChange('请假',this)">📋 请假</div>
                <div class="attend-type-tab" data-type="出差" onclick="onAttendTypeChange('出差',this)">🚗 出差</div>
            </div>
            <div class="attend-info-row">
                <span class="label">🕐 当前时间</span>
                <span class="value" id="attendTime">--</span>
            </div>
            <div class="attend-info-row">
                <span class="label">📍 位置</span>
                <span class="value" id="attendLocation">获取中...</span>
            </div>
            <!-- 正常打卡区域（签到/签退） -->
            <div id="attendNormalSection">
                <div class="attend-camera-wrap" id="cameraWrap">
                    <video id="attendVideo" autoplay playsinline></video>
                    <canvas id="attendCanvas"></canvas>
                    <div class="face-indicator" id="faceIndicator"></div>
                    <div class="face-status" id="faceStatus">📷 请拍摄人脸</div>
                </div>
                <div class="camera-action-row">
                    <button class="camera-retry-btn" id="cameraRetryBtn" onclick="retryCamera()">🔄 重连相机</button>
                    <button class="camera-switch-btn" id="cameraSwitchBtn" onclick="switchCamera()">🔄 切换摄像头</button>
                </div>
                <button class="attend-capture-btn" id="captureBtn" onclick="capturePhoto()">📷 拍摄照片</button>
                <div class="attend-finger-row">
                    <span class="label">🔐 本机验证</span>
                    <span class="attend-finger-status unavailable" id="fingerStatus">检测中...</span>
                    <button class="attend-finger-btn" id="fingerBtn" disabled onclick="verifyFingerprint()">本机指纹</button>
                </div>
            </div>
            <!-- 请假/出差区域 -->
            <div class="attend-leave-section" id="attendLeaveSection">
                <div class="date-row">
                    <div class="date-field">
                        <label>开始日期</label>
                        <input type="date" id="leaveStartDate">
                    </div>
                    <div class="date-field">
                        <label>结束日期</label>
                        <input type="date" id="leaveEndDate">
                    </div>
                </div>
                <textarea id="leaveReason" placeholder="请输入事由说明..."></textarea>
            </div>
            <!-- 请假/出差提交后状态 -->
            <div class="attend-leave-status" id="attendLeaveStatus"></div>
            <!-- 验证状态栏 -->
            <div class="attend-verify-bar" id="verifyBar" style="display:none">
                <div class="v-item" id="vGps">📍 定位</div>
                <div class="v-item" id="vFace">📷 人脸</div>
                <div class="v-item" id="vFinger">🔐 指纹</div>
            </div>
            <button class="attend-submit" id="attendSubmit" disabled onclick="submitAttendance()">
                确认打卡
            </button>
            <div class="attend-location-status getting" id="locationStatus">正在获取位置...</div>
            <!-- 指纹确认框（嵌入） -->
            <div class="finger-confirm-overlay" id="fingerConfirmOverlay">
                <div class="finger-confirm-dialog">
                    <p>是否使用本机设备完成验证？</p>
                    <div class="device-id" id="fingerDeviceId">--</div>
                    <div class="finger-confirm-btns">
                        <button class="btn-confirm" onclick="confirmFingerprint(true)">确定</button>
                        <button class="btn-cancel" onclick="confirmFingerprint(false)">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
