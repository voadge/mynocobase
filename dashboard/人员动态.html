<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人员动态</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="/dashboard/assets/location-service.js?v=1"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c1426 0%, #1a2332 50%, #0d1926 100%);
            color: #e0e6ed;
        }
        .app { display: flex; flex-direction: column; height: 100vh; min-height: 100dvh; }
        .main-area { display: flex; flex: 1; min-height: 0; position: relative; z-index: 0; }
        .map-wrap { flex: 1; position: relative; min-height: 0; }
        #map { width: 100%; height: 100%; }
        .map-search-bar {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            display: flex; gap: 3px;
            background: rgba(20,30,48,0.92);
            padding: 3px 6px; border-radius: 6px;
            border: 1px solid #445;
        }
        .map-search-bar input {
            padding: 3px 6px; border-radius: 4px; border: none;
            background: transparent; color: #e0e6ed;
            font-size: 0.85em; width: 160px; outline: none;
        }
        .map-search-bar input::placeholder { color: #5a6a7a; }
        .map-search-bar button {
            padding: 3px 6px; font-size: 0.85em;
            background: transparent; border: none; color: #00d4ff;
            cursor: pointer;
        }
        .map-search-bar button:hover { color: #7b2cbf; }
        .locate-btn { font-size: 1.1em; line-height: 1; padding: 3px 8px !important; }
        .map-search-results {
            position: absolute; top: 40px; right: 10px; z-index: 1000;
            background: rgba(20,30,48,0.96);
            border: 1px solid #445; border-radius: 5px;
            max-height: 200px; overflow-y: auto; width: 280px;
            display: none;
        }
        .map-search-results div {
            padding: 6px 10px; cursor: pointer; font-size: 0.82em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #aab;
        }
        .map-search-results div:hover { background: rgba(0,212,255,0.15); color: #e0e6ed; }
        .map-search-results div.highlight { background: rgba(0,212,255,0.25); color: #fff; }
        @media (max-width: 768px) {
            .map-search-bar input { width: 100px; }
            .map-search-results { width: 200px; max-height: 160px; }
        }
        .right-panel {
            position: absolute; top: 0; right: 0; bottom: 0; z-index: 1000;
            width: 240px;
            display: flex; flex-direction: column;
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(6px);
            border-left: 1px solid rgba(0,212,255,0.12);
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: translateX(100%); opacity: 0;
            pointer-events: none;
        }
        .right-panel.open {
            transform: translateX(0); opacity: 1;
            pointer-events: auto;
        }
        .panel-toggle {
            position: absolute; top: 50%; right: 0; z-index: 1001;
            transform: translateY(-50%);
            background: rgba(10,14,26,0.8);
            border: 1px solid rgba(0,212,255,0.15);
            border-right: none;
            color: #00d4ff; font-size: 0.9em;
            padding: 10px 4px; cursor: pointer;
            border-radius: 6px 0 0 6px;
            transition: background 0.2s, right 0.3s ease;
            writing-mode: vertical-lr;
            letter-spacing: 2px;
        }
        .panel-toggle:hover { background: rgba(0,212,255,0.15); }
        .panel-toggle.open { right: 240px; }
        @media (max-width: 768px) {
            .panel-toggle.open { right: 200px; }
        }
        @media (max-width: 480px) {
            .panel-toggle.open { right: 160px; }
        }
        .panel-header {
            padding: 10px 12px 6px; flex-shrink: 0;
            border-bottom: 1px solid rgba(0,212,255,0.08);
        }
        .panel-header h3 { font-size: 0.85em; color: #00d4ff; margin-bottom: 6px; }
        .panel-search {
            width: 100%; padding: 5px 8px; border-radius: 5px;
            border: 1px solid rgba(0,212,255,0.18);
            background: rgba(0,0,0,0.3); color: #e0e6ed;
            font-size: 0.8em; outline: none;
        }
        .panel-search::placeholder { color: #5a6a7a; }
        .panel-list {
            flex: 1; overflow-y: auto; min-height: 0;
            padding: 4px 0;
        }
        .panel-list::-webkit-scrollbar { width: 4px; }
        .panel-list::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 2px; }
        .search-results {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            max-height: 200px; overflow-y: auto;
            background: rgba(10,14,26,0.96);
            border-top: 1px solid rgba(0,212,255,0.15);
            display: none;
        }
        .search-results div { padding: 6px 12px; cursor: pointer; font-size: 0.82em; border-bottom: 1px solid rgba(255,255,255,0.04); color: #aab; }
        .search-results div:hover { background: rgba(0,212,255,0.15); color: #e0e6ed; }
        .dept-group { margin-bottom: 2px; }
        .dept-title {
            padding: 5px 12px; font-size: 0.78em; font-weight: 600;
            color: #5a6a7a; letter-spacing: 0.5px;
            background: rgba(0,212,255,0.04);
            border-bottom: 1px solid rgba(0,212,255,0.05);
            position: sticky; top: 0; z-index: 1;
            backdrop-filter: blur(4px);
        }
        .user-item {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 12px 5px 16px;
            cursor: pointer; transition: background 0.15s;
            font-size: 0.82em;
        }
        .user-item:hover { background: rgba(0,212,255,0.08); }
        .user-item.active { background: rgba(0,212,255,0.12); border-left: 2px solid #00d4ff; }
        .user-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .user-dot.online { background: #00ff88; box-shadow: 0 0 6px rgba(0,255,136,0.5); }
        .user-dot.offline { background: #5a6a7a; }
        .user-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .user-badge {
            font-size: 0.7em; padding: 0 5px; border-radius: 3px;
            background: rgba(0,212,255,0.1); color: #00d4ff; flex-shrink: 0;
        }
        .user-badge.tracking { background: rgba(255,216,61,0.15); color: #ffd93d; }
        .empty-search {
            padding: 20px 12px; text-align: center; color: #5a6a7a; font-size: 0.82em;
        }
        .bottom-bar {
            display: flex; align-items: center;
            height: 48px;
            background: rgba(12,20,38,0.95);
            border-top: 1px solid rgba(0,212,255,0.12);
            font-size: 0.78em;
        }
        .bar-left {
            display: flex; align-items: center; gap: 14px;
            padding: 0 14px;
            margin-left: 180px;
            flex-shrink: 0;
            border-right: 1px solid rgba(0,212,255,0.15);
        }
        .bar-left .stat-item { white-space: nowrap; }
        .bar-left .stat-num { color: #00d4ff; font-weight: 700; font-size: 1.1em; }
        .bar-scroll {
            display: flex; align-items: center; gap: 12px;
            padding: 0 14px; overflow-x: auto; flex: 1;
            -webkit-overflow-scrolling: touch;
        }
        .bar-scroll::-webkit-scrollbar { height: 2px; }
        .bar-scroll::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 1px; }
        .bar-scroll .proj-stat { white-space: nowrap; flex-shrink: 0; }
        .proj-stat .proj-name { color: #7b88a0; }
        .proj-stat .proj-num { color: #e0e6ed; font-weight: 600; }
        .leaflet-container { background: #0a0f1a; }
        .leaflet-control-zoom a { background: rgba(20,30,48,0.9) !important; color: #e0e6ed !important; border-color: #445 !important; }
        .leaflet-popup-content-wrapper {
            background: rgba(12,20,38,0.95) !important;
            color: #e0e6ed !important;
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px !important;
            font-size: 0.82em;
        }
        .leaflet-popup-tip { background: rgba(12,20,38,0.95) !important; border: 1px solid rgba(0,212,255,0.2); }
        .leaflet-popup-close-button { color: #5a6a7a !important; }
        .map-status {
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #e0e6ed;
            padding: 4px 16px; border-radius: 8px;
            font-size: 0.82em; z-index: 1000; pointer-events: none;
            white-space: nowrap;
            border: 1px solid rgba(0,212,255,0.15);
        }
        .map-loading {
            position: absolute; bottom: 8px; right: 8px;
            color: #5a6a7a; font-size: 0.7em; z-index: 1000;
            background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 4px;
        }
        .map-trajectory-info {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            color: #ffd93d; font-size: 0.75em; z-index: 1000;
            background: rgba(0,0,0,0.5); padding: 2px 12px; border-radius: 4px;
            pointer-events: none; white-space: nowrap;
        }
        @media (max-width: 768px) {
            .right-panel { width: 200px; }
            .bottom-bar {
                height: 22px; font-size: 0.55em;
            }
            .bar-left { gap: 4px; padding: 0 6px; }
            .bar-scroll { gap: 6px; padding: 0 8px; }
            .app { min-height: 100dvh; }
        }
        @media (max-width: 480px) {
            .right-panel { width: 160px; }
            .bottom-bar {
                height: 16px; font-size: 0.45em;
            }
            .bar-left { gap: 3px; padding: 0 4px; }
            .bar-scroll { gap: 4px; padding: 0 4px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="main-area">
        <div class="map-wrap">
            <div id="map"></div>
            <div class="map-status" id="mapStatus">人员动态 · 实时位置</div>
            <div class="map-loading" id="mapLoading">加载中...</div>
            <div class="map-trajectory-info" id="trajectoryInfo"></div>
            <div class="map-search-bar">
                <input type="text" id="mapSearchInput" placeholder="搜索地名/POI..." oninput="onMapSearchInput()" onkeydown="if(event.key==='Enter') searchPlace()">
                <button type="button" onclick="searchPlace()">🔍</button>
                <button type="button" class="locate-btn" onclick="locateMe()" title="定位当前位置">◎</button>
            </div>
            <div class="map-search-results" id="mapSearchResults"></div>
        </div>
        <button class="panel-toggle" id="panelToggle" onclick="togglePanel()" title="切换人员列表">人员列表 ▶</button>
        <div class="right-panel" id="rightPanel">
            <div class="panel-header">
                <div style="display:flex;align-items:center;gap:6px">
                    <h3 style="margin:0;flex:1">👥 人员列表</h3>
                    <button onclick="locateMe()" title="回到当前位置" style="background:transparent;border:none;color:#00d4ff;font-size:1em;cursor:pointer;padding:2px 4px">◎</button>
                </div>
                <input class="panel-search" id="searchInput" placeholder="查询项目/人名..." oninput="onSearch()" style="margin-top:6px">
            </div>
            <div class="panel-list" id="userList"></div>
        </div>
    </div>
    <div class="bottom-bar" id="bottomBar">
        <div class="bar-left">
            <span class="stat-item">今日打卡: <span class="stat-num" id="todayCount">--</span></span>
            <span class="stat-item">在线: <span class="stat-num" id="onlineCount">--</span></span>
        </div>
        <div class="bar-scroll" id="barScroll"></div>
    </div>
</div>

<script>
// ========== 常量 & 状态 ==========
var token = localStorage.getItem("NOCOBASE_TOKEN") || localStorage.getItem("nocobase_token");
var headers = { 'Content-Type': 'application/json' };
if (token) headers['Authorization'] = 'Bearer ' + token;
var credentials = 'include';

var map, amapLayer;
var allUsers = [];
var allFences = [];
var todayRecords = [];
var latestLocations = {};
var onlineStatus = {};
var selectedUserId = null;

var userMarkers = {};
var fenceLayers = [];
var trajectoryLayer = null;
var trajectoryStartMarker = null;
var trajectoryEndMarker = null;
var currentLocationMarker = null;

var pollTimer = null;
var lastSnapshotData = null;

var MOBILE_MAX_MARKERS = 20;

// 轨迹缓存 { uid: { points, timestamp } }
var trajectoryCache = {};
var TRAJECTORY_CACHE_TTL = 120000; // 2分钟
var TRAJECTORY_MAX_DAYS = 7;       // 默认加载7天
var TRAJECTORY_MAX_POINTS = 300;   // 最大点数

// ========== 初始化地图 (Canvas 渲染器) ==========
function initMap() {
    map = L.map('map', {
        renderer: L.canvas({ padding: 0.5 }),
        preferCanvas: true
    }).setView([27.7, 106.9], 10);
    amapLayer = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: ['1','2','3','4'], maxZoom: 18,
        attribution: '&copy; 高德地图',
    }).addTo(map);
    map.on('locationfound', function(e) {
        if (currentLocationMarker) map.removeLayer(currentLocationMarker);
        currentLocationMarker = L.circleMarker([e.latitude, e.longitude], {
            radius: 6, color: '#00d4ff', fillColor: '#00d4ff', fillOpacity: 0.3, weight: 2
        }).addTo(map).bindTooltip('我', { permanent: false });
    });
}

// ========== API ==========
function apiGet(url) {
    return fetch(url, { headers: headers, credentials: credentials }).then(function(r){
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    });
}

// ========== 聚合加载 (单请求全量) ==========
function loadSnapshot() {
    apiGet('/api/__pd__/dashboard-snapshot').then(function(data){
        lastSnapshotData = data;
        allUsers = data.workers || [];
        allFences = data.fences || [];
        todayRecords = data.records || [];
        var locs = data.latestLocations || {};
        for (var uid in locs) { latestLocations[uid] = locs[uid]; }
        var onl = data.online || {};
        for (var uid2 in onl) { onlineStatus[uid2] = onl[uid2]; }
        renderFences();
        renderUserList(document.getElementById('searchInput').value.trim().toLowerCase());
        renderBottomBar(data.stats);
        renderMarkers();
        document.getElementById('mapLoading').textContent = '已更新 ' + new Date().toLocaleTimeString();
    }).catch(function(){
        document.getElementById('mapLoading').textContent = '更新失败，使用上次数据';
    });
}

// ========== 围栏 ==========
function renderFences() {
    fenceLayers.forEach(function(l){ map.removeLayer(l); });
    fenceLayers = [];
    allFences.forEach(function(fence){
        if (!fence.polyline_coords) return;
        try {
            var coords = JSON.parse(fence.polyline_coords);
            if (!Array.isArray(coords) || coords.length < 2) return;
            var latlngs = coords.map(function(p){ return [p[1], p[0]]; });
            var layer = L.polyline(latlngs, {
                color: '#00d4ff', weight: 2, opacity: 0.5
            }).addTo(map);
            layer.bindTooltip(fence.fence_name, { sticky: true });
            fenceLayers.push(layer);
            try {
                var line = turf.lineString(coords);
                var buf = turf.buffer(line, fence.buffer_radius || 200, { units: 'meters' });
                var bufLayer = L.geoJSON(buf, {
                    color: '#00d4ff', weight: 1, fillColor: '#00d4ff', fillOpacity: 0.08
                }).addTo(map);
                fenceLayers.push(bufLayer);
            } catch(e) {}
        } catch(e) {}
    });
}

// ========== 渲染标记 (Canvas 原生) ==========
function renderMarkers() {
    for (var uid in userMarkers) { map.removeLayer(userMarkers[uid]); }
    userMarkers = {};
    var isMobile = window.innerWidth < 768;
    var maxMarkers = isMobile ? MOBILE_MAX_MARKERS : Infinity;
    var count = 0;
    var hiddenCount = 0;

    allUsers.forEach(function(u){
        if (count >= maxMarkers) { hiddenCount++; return; }
        var uid = u.id;
        var loc = latestLocations[uid];
        if (!loc || !loc.lat || !loc.lng) return;
        var isOnline = onlineStatus[uid];
        var latlng = [parseFloat(loc.lat), parseFloat(loc.lng)];
        var accuracyColor = '#00ff88';
        if (typeof LocationService !== 'undefined' && LocationService.getAccuracyColor) {
            accuracyColor = LocationService.getAccuracyColor(loc.accuracy);
        }
        var marker = L.circleMarker(latlng, {
            radius: isOnline ? 7 : 5,
            color: accuracyColor,
            fillColor: isOnline ? '#00ff88' : '#5a6a7a',
            fillOpacity: isOnline ? 0.8 : 0.4,
            weight: isOnline ? 2 : 1,
        }).addTo(map);
        marker.bindPopup(createPopupContent(u, loc, isOnline));
        marker.on('click', function(uid){
            return function(){ selectUser(uid); };
        }(uid));
        userMarkers[uid] = marker;
        count++;
    });
    if (hiddenCount > 0) {
        showClusterHint(hiddenCount);
    }
}

function createPopupContent(u, loc, isOnline) {
    var addr = [loc.township, loc.street, loc.district].filter(Boolean).join(' · ');
    var accColor = '#00ff88';
    if (typeof LocationService !== 'undefined' && LocationService.getAccuracyColor) {
        accColor = LocationService.getAccuracyColor(loc.accuracy);
    }
    var lines = [
        '<b>' + escHtml(u.nickname || u.username) + '</b>',
        isOnline ? '🟢 在线' : '⚪ 离线',
    ];
    if (addr) lines.push('📍 ' + addr);
    if (loc.accuracy != null) {
        lines.push('<span style="color:' + accColor + '">精度: ±' + Math.round(loc.accuracy) + 'm</span>');
    }
    if (loc.recorded_at) {
        lines.push('<small>' + new Date(loc.recorded_at).toLocaleString() + '</small>');
    }
    return lines.filter(Boolean).join('<br>');
}

function showClusterHint(n) {
    var el = document.getElementById('mapStatus');
    if (el) el.textContent = '人员动态 · ' + n + ' 人未显示（移动端限制）';
    setTimeout(function(){
        if (el) el.textContent = '人员动态 · 实时位置';
    }, 3000);
}

// ========== 用户列表 ==========
var _searchDebounce = null;
function renderUserList(query) {
    var container = document.getElementById('userList');
    var deptMap = {};
    allUsers.forEach(function(u){
        var depts = u.departments || [];
        if (depts.length === 0) {
            if (!deptMap['__none']) deptMap['__none'] = { title: '未分配', users: [] };
            deptMap['__none'].users.push(u);
        } else {
            depts.forEach(function(d){
                var key = d.id || d.title;
                if (!deptMap[key]) deptMap[key] = { title: d.title || ('部门#' + d.id), users: [] };
                deptMap[key].users.push(u);
            });
        }
    });
    var html = '';
    var hasAny = false;
    var deptKeys = Object.keys(deptMap).sort(function(a,b){
        return (deptMap[a].title || '').localeCompare(deptMap[b].title || '');
    });
    deptKeys.forEach(function(key){
        var group = deptMap[key];
        var matchedUsers = group.users;
        var deptMatch = false;
        if (query) {
            deptMatch = (group.title || '').toLowerCase().indexOf(query) !== -1;
            if (!deptMatch) {
                matchedUsers = group.users.filter(function(u){
                    var name = (u.nickname || u.username || '').toLowerCase();
                    var phone = (u.phone || '').toLowerCase();
                    var uname = (u.username || '').toLowerCase();
                    return name.indexOf(query) !== -1 || phone.indexOf(query) !== -1 || uname.indexOf(query) !== -1;
                });
            }
        }
        if (matchedUsers.length === 0) return;
        hasAny = true;
        html += '<div class="dept-group">';
        html += '<div class="dept-title">' + escHtml(group.title || '未分配') + '</div>';
        matchedUsers.forEach(function(u){
            var uid = u.id;
            var isOnline = onlineStatus[uid];
            var loc = latestLocations[uid];
            var isSelected = (selectedUserId === uid);
            html += '<div class="user-item' + (isSelected ? ' active' : '') + '" onclick="selectUser(' + uid + ')" data-uid="' + uid + '">';
            html += '<span class="user-dot ' + (isOnline ? 'online' : 'offline') + '"></span>';
            html += '<span class="user-name">' + escHtml(u.nickname || u.username) + '</span>';
            if (!loc) html += '<span class="user-badge">无位置</span>';
            else if (isOnline) html += '<span class="user-badge">在线</span>';
            if (isSelected) html += '<span class="user-badge tracking">追踪中</span>';
            html += '</div>';
        });
        html += '</div>';
    });
    if (!hasAny) {
        html = '<div class="empty-search">' + (query ? '无匹配人员' : '暂无工人数据') + '</div>';
    }
    container.innerHTML = html;
}

function onSearch() {
    if (_searchDebounce) clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(function(){
        var q = document.getElementById('searchInput').value.trim().toLowerCase();
        renderUserList(q);
    }, 200);
}

// ========== 选择人员 ==========
function selectUser(uid) {
    if (!uid) return;
    selectedUserId = uid;
    renderUserList(document.getElementById('searchInput').value.trim().toLowerCase());
    var loc = latestLocations[uid];
    if (loc && loc.lat && loc.lng) {
        map.setView([parseFloat(loc.lat), parseFloat(loc.lng)], 14, { animate: true });
    }
    loadTrajectory(uid);
}

// ========== 轨迹加载 (缓存 + 时间边界 + 精度/速度过滤 + 平滑) ==========
function clearTrajectory() {
    if (trajectoryLayer) { map.removeLayer(trajectoryLayer); trajectoryLayer = null; }
    if (trajectoryStartMarker) { map.removeLayer(trajectoryStartMarker); trajectoryStartMarker = null; }
    if (trajectoryEndMarker) { map.removeLayer(trajectoryEndMarker); trajectoryEndMarker = null; }
    document.getElementById('trajectoryInfo').textContent = '';
}

function loadTrajectory(uid, force) {
    clearTrajectory();
    // 检查缓存
    var cached = trajectoryCache[uid];
    if (cached && !force && Date.now() - cached.ts < TRAJECTORY_CACHE_TTL) {
        renderTrajectory(cached.points);
        return;
    }
    document.getElementById('trajectoryInfo').textContent = '加载轨迹...';
    var now = new Date();
    var past = new Date(now.getTime() - TRAJECTORY_MAX_DAYS * 86400000);
    var url = '/api/location_history:list?filter[createdById]=' + uid
        + '&filter[is_valid]=true&filter[recorded_at][$gte]=' + past.toISOString()
        + '&sort=recorded_at&pageSize=' + TRAJECTORY_MAX_POINTS;
    apiGet(url).then(function(data){
        var records = data.data || [];
        var points = records
            .filter(function(r){ return r.accuracy == null || r.accuracy <= 150; })
            .map(function(r){
                var ts = r.recorded_at ? new Date(r.recorded_at).getTime() : 0;
                return { lat: parseFloat(r.latitude), lng: parseFloat(r.longitude), ts: ts };
            })
            .filter(function(p, i, arr){
                if (i === 0) return true;
                var dist = _haversine([p.lat, p.lng], [arr[i-1].lat, arr[i-1].lng]);
                var dt = arr[i-1].ts > 0 && p.ts > 0 ? (p.ts - arr[i-1].ts) / 1000 : 0;
                if (dist > 3000) return false;              // 单次跳变 >3km 丢弃
                if (dt > 0 && dt < 3 && dist > 100) return false; // 3秒内>100m 视为漂移
                if (dt > 0 && dist/dt > 100) return false;  // 速度 >100m/s 丢弃
                return true;
            })
            .map(function(p){ return [p.lat, p.lng]; });
        if (points.length < 2) {
            document.getElementById('trajectoryInfo').textContent = '轨迹点不足';
            return;
        }
        var smoothed = _smoothTrajectory(points, 0.25);
        // 写入缓存
        trajectoryCache[uid] = { points: smoothed, ts: Date.now() };
        renderTrajectory(smoothed);
    }).catch(function(){
        document.getElementById('trajectoryInfo').textContent = '轨迹加载失败';
    });
}

function renderTrajectory(smoothed) {
    trajectoryLayer = L.polyline(smoothed, {
        color: '#ffd93d', weight: 3, opacity: 0.7, dashArray: '8,6'
    }).addTo(map);
    trajectoryStartMarker = L.circleMarker(smoothed[0], {
        radius: 5, color: '#00ff88', fillColor: '#00ff88', fillOpacity: 0.8, weight: 2
    }).addTo(map).bindTooltip('起点', { permanent: false });
    trajectoryEndMarker = L.circleMarker(smoothed[smoothed.length - 1], {
        radius: 5, color: '#ff6b6b', fillColor: '#ff6b6b', fillOpacity: 0.8, weight: 2
    }).addTo(map).bindTooltip('终点', { permanent: false });
    var dist = 0;
    for (var i = 1; i < smoothed.length; i++) {
        dist += _haversine(smoothed[i-1], smoothed[i]);
    }
    document.getElementById('trajectoryInfo').textContent = '轨迹: ' + smoothed.length + '点, ' + Math.round(dist) + 'm';
    map.fitBounds(trajectoryLayer.getBounds().pad(0.2));
}

function _smoothTrajectory(points, alpha) {
    if (alpha === undefined) alpha = 0.25;
    if (points.length < 3) return points;
    var result = [points[0]];
    for (var i = 1; i < points.length; i++) {
        var prev = result[result.length - 1];
        result.push([
            prev[0] + alpha * (points[i][0] - prev[0]),
            prev[1] + alpha * (points[i][1] - prev[1])
        ]);
    }
    return result;
}

function _haversine(p1, p2) {
    var R = 6371000;
    var lat1 = p1[0], lng1 = p1[1], lat2 = p2[0], lng2 = p2[1];
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ========== 底部统计 ==========
function renderBottomBar(stats) {
    if (stats) {
        document.getElementById('todayCount').textContent = stats.totalCheckedIn || 0;
        document.getElementById('onlineCount').textContent = stats.onlineCount || 0;
    } else {
        var totalCheckin = 0;
        var onlineCount = 0;
        var checkedUsers = {};
        todayRecords.forEach(function(r){
            var uid = r.createdBy ? (r.createdBy.id || r.createdById) : null;
            if (!uid || checkedUsers[uid]) return;
            if (r.check_type === '上班' || r.check_type === '签到') {
                checkedUsers[uid] = true;
                totalCheckin++;
            }
        });
        for (var uid in onlineStatus) {
            if (onlineStatus[uid]) onlineCount++;
        }
        document.getElementById('todayCount').textContent = totalCheckin;
        document.getElementById('onlineCount').textContent = onlineCount;
    }

    var deptStats = {};
    allUsers.forEach(function(u){
        if (!checkedUsers && !onlineStatus[u.id]) return;
        var depts = u.departments || [];
        var dTitle = (depts.length > 0) ? depts[0].title : '未分配';
        if (!deptStats[dTitle]) deptStats[dTitle] = { total: 0, online: 0 };
        if (onlineStatus[u.id]) deptStats[dTitle].total++;
        if (onlineStatus[u.id]) deptStats[dTitle].online++;
    });
    var barHtml = '';
    var deptNames = Object.keys(deptStats).sort();
    deptNames.forEach(function(name){
        var s = deptStats[name];
        barHtml += '<span class="proj-stat"><span class="proj-name">' + escHtml(name) + ':</span> <span class="proj-num">' + s.online + '/' + s.total + '</span></span>';
    });
    if (!barHtml) barHtml = '<span class="proj-stat" style="color:#5a6a7a">暂无数据</span>';
    document.getElementById('barScroll').innerHTML = barHtml;
}

// ========== 轮询 ==========
function startPolling() {
    loadSnapshot();
    pollTimer = setInterval(loadSnapshot, 10000);
    setInterval(function(){
        if (lastSnapshotData && lastSnapshotData.fences) {
            allFences = lastSnapshotData.fences;
            renderFences();
        }
    }, 30000);
}

// ========== 工具函数 ==========
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== 面板切换 ==========
var panelOpen = false;
function togglePanel(force) {
    panelOpen = force !== undefined ? force : !panelOpen;
    document.getElementById('rightPanel').classList.toggle('open', panelOpen);
    document.getElementById('panelToggle').textContent = panelOpen ? '人员列表 ◀' : '人员列表 ▶';
}

// ========== 定位当前位置 ==========
var _locMarker = null;
function _placeMarker(lat, lng, label) {
    if (_locMarker) { map.removeLayer(_locMarker); }
    _locMarker = L.circleMarker([lat, lng], {
        radius: 7, color: '#00d4ff', fillColor: '#00d4ff', fillOpacity: 0.25, weight: 2
    }).addTo(map).bindTooltip(label || '当前位置', { permanent: false });
    map.setView([lat, lng], 16);
}
async function locateMe() {
    if (typeof LocationService !== 'undefined' && LocationService.getCurrentPosition) {
        try {
            var pos = await LocationService.getCurrentPosition({ highAccuracy: true, timeout: 10000 });
            _placeMarker(pos.lat, pos.lng, '当前位置（GPS）');
            return;
        } catch(e) {}
    }
    if (typeof Capacitor !== 'undefined' && Capacitor.isNative && Capacitor.Plugins && Capacitor.Plugins.Geolocation) {
        try {
            var capPos = await Capacitor.Plugins.Geolocation.getCurrentPosition({ enableHighAccuracy: true, timeout: 10000 });
            _placeMarker(capPos.coords.latitude, capPos.coords.longitude, '当前位置（GPS）');
            return;
        } catch(e) {}
    }
    if (typeof window.appBridge !== 'undefined' && window.appBridge.getLocation) {
        window.appBridge.getLocation(
            function(lat, lng){ _placeMarker(lat, lng, '当前位置（GPS）'); },
            function(){}
        );
        return;
    }
    try {
        var r = await fetch('/api/__pd__/locate', { headers: headers });
        if (r.ok) {
            var d = await r.json();
            if (d && d.rectangle) {
                var parts = d.rectangle.split(';');
                var c1 = parts[0].split(','), c2 = parts[1].split(',');
                var clat = (parseFloat(c1[1]) + parseFloat(c2[1])) / 2;
                var clng = (parseFloat(c1[0]) + parseFloat(c2[0])) / 2;
                _placeMarker(clat, clng, '当前位置（' + (d.city || 'IP定位') + '）');
                return;
            }
        }
    } catch(e) {}
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(function(pos){
        _placeMarker(pos.coords.latitude, pos.coords.longitude, '当前位置（浏览器定位）');
    }, function(){}, { enableHighAccuracy: true, timeout: 10000 });
}

// ========== 地名搜索 (高德 InputTips + 分类标签 + 键盘导航) ==========
var _mapSearchDebounce = null;
var _searchSelectedIdx = -1;
var _searchResults = [];

function onMapSearchInput() {
    if (_mapSearchDebounce) clearTimeout(_mapSearchDebounce);
    _mapSearchDebounce = setTimeout(function(){
        var q = document.getElementById('mapSearchInput').value.trim();
        if (q.length >= 2) searchPlace();
    }, 300);
}
async function searchPlace() {
    var q = document.getElementById('mapSearchInput').value.trim();
    if (!q) return;
    var container = document.getElementById('mapSearchResults');
    container.style.display = 'block';
    container.innerHTML = '<div style="color:#5a6a7a;padding:8px">搜索中...</div>';
    _searchResults = [];
    _searchSelectedIdx = -1;
    try {
        var resp = await fetch('/api/__pd__/geocode?q=' + encodeURIComponent(q), { headers: headers });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var d = await resp.json();
        container.innerHTML = '';
        if (d && d.tips && d.tips.length > 0) {
            d.tips.forEach(function(tip){
                if (!tip.location) return;
                var parts = tip.location.split(',');
                if (parts.length < 2) return;
                var badge = getTypeLabel(tip.typecode);
                _searchResults.push({ lat: parseFloat(parts[1]), lng: parseFloat(parts[0]), name: tip.name, addr: tip.address, badge: badge });
                var div = document.createElement('div');
                div.className = 'search-result-item';
                div.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center"><span><strong>' + escHtml(tip.name) + '</strong></span>' + (badge ? '<span class="type-badge" style="font-size:0.7em;padding:1px 6px;border-radius:4px;background:rgba(0,212,255,0.1);color:#00d4ff;white-space:nowrap">' + badge + '</span>' : '') + '</div><div style="font-size:0.85em;color:#5a6a7a;margin-top:1px">' + escHtml(tip.address || tip.district || '') + '</div>';
                div.onclick = function(){
                    map.setView([parseFloat(parts[1]), parseFloat(parts[0])], 15);
                    container.style.display = 'none';
                };
                container.appendChild(div);
            });
            if (_searchResults.length > 0) {
                container.querySelector('.search-result-item')?.classList.add('highlight');
                _searchSelectedIdx = 0;
            }
        } else {
            container.innerHTML = '<div style="color:#5a6a7a;padding:8px">未找到结果</div>';
        }
    } catch(e) {
        container.innerHTML = '<div style="color:#ff6b6b;padding:8px">搜索失败</div>';
    }
}
function getTypeLabel(t) {
    if (!t) return '';
    if (t.startsWith('02')) return '省'; if (t.startsWith('03')) return '城市';
    if (t.startsWith('04')) return '区县'; if (t.startsWith('11')) return '景点';
    if (t.startsWith('05')) return '餐饮'; if (t.startsWith('10')) return '住宿';
    if (t.startsWith('14')) return '科教'; if (t.startsWith('15')) return '交通';
    if (t.startsWith('13')) return '政府'; if (t.startsWith('06')) return '购物';
    return 'POI';
}
// 键盘导航
document.getElementById('mapSearchInput').addEventListener('keydown', function(e) {
    var container = document.getElementById('mapSearchResults');
    if (container.style.display !== 'block' || _searchResults.length === 0) return;
    var items = container.querySelectorAll('.search-result-item');
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (_searchSelectedIdx < items.length - 1) _searchSelectedIdx++;
        else _searchSelectedIdx = 0;
        items.forEach(function(el, i){ el.classList.toggle('highlight', i === _searchSelectedIdx); });
        if (items[_searchSelectedIdx]) items[_searchSelectedIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (_searchSelectedIdx > 0) _searchSelectedIdx--;
        else _searchSelectedIdx = items.length - 1;
        items.forEach(function(el, i){ el.classList.toggle('highlight', i === _searchSelectedIdx); });
        if (items[_searchSelectedIdx]) items[_searchSelectedIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
        e.preventDefault();
        if (_searchSelectedIdx >= 0 && _searchSelectedIdx < _searchResults.length) {
            var r = _searchResults[_searchSelectedIdx];
            map.setView([r.lat, r.lng], 15);
            container.style.display = 'none';
        }
    } else if (e.key === 'Escape') {
        container.style.display = 'none';
    }
});
document.addEventListener('click', function(e) {
    var bar = document.querySelector('.map-search-bar');
    var sr = document.getElementById('mapSearchResults');
    if (bar && bar.contains(e.target)) return;
    if (sr && !sr.contains(e.target)) sr.style.display = 'none';
});

// ========== 启动 ==========
function onUserPositionUpdate(pos) {
    var data = {
        lat: pos.coords ? pos.coords.latitude : pos.lat,
        lng: pos.coords ? pos.coords.longitude : pos.lng,
        accuracy: pos.coords ? pos.coords.accuracy : pos.accuracy,
    };
    if (currentLocationMarker) map.removeLayer(currentLocationMarker);
    currentLocationMarker = L.circleMarker([data.lat, data.lng], {
        radius: 6, color: '#00d4ff', fillColor: '#00d4ff', fillOpacity: 0.3, weight: 2
    }).addTo(map).bindTooltip('我', { permanent: false });
}

document.addEventListener('DOMContentLoaded', function(){
    if (typeof LocationService !== 'undefined') {
        if (LocationService._checkConsent()) {
            LocationService.watchPosition(onUserPositionUpdate);
        } else {
            document.getElementById('mapStatus').textContent = '⚠ 位置采集未授权';
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/dashboard/sw.js', { scope: '/dashboard/' }).catch(function(){});
        }
    }
    document.getElementById('mapLoading').textContent = '初始化...';
    initMap();
    startPolling();
});
</script>
