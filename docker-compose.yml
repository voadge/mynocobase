services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: ./env/postgres.env
    command:
      - postgres
      - -c
      - shared_buffers=1024MB
      - -c
      - effective_cache_size=2048MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - random_page_cost=1.1
      - -c
      - max_connections=50
      - -c
      - wal_buffers=16MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - log_min_duration_statement=1000
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nocobase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocobase"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "nocobase123"]
    volumes:
      - redis-data:/data
    networks:
      - nocobase
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

  app:
    image: nocobase/nocobase:beta-full
    restart: unless-stopped
    env_file: ./env/app.env
    volumes:
      - ./storage:/app/nocobase/storage
      - ./dashboard:/app/nocobase/storage/dashboard:ro
      - ./plugin-dashboard-home:/app/nocobase/node_modules/@nocobase/plugin-dashboard-home:ro
    networks:
      - nocobase
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/nocobase/storage/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./acme-challenge:/var/www/acme:ro
      - ./dashboard:/usr/share/nginx/html/dashboard:ro
      - ./dashboard-dev:/usr/share/nginx/html/dashboard-dev:ro
    ports:
      - "80:80"
      - "668:443"
    networks:
      - nocobase
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M

networks:
  nocobase:

volumes:
  postgres-data:
  redis-data:
