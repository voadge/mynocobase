services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: ./env/postgres.env
    command:
      - postgres
      - -c
      - shared_buffers=96MB
      - -c
      - effective_cache_size=384MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - random_page_cost=1.0
      - -c
      - max_connections=50
      - -c
      - wal_buffers=32MB
      - -c
      - effective_io_concurrency=200
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - log_min_duration_statement=1000
      - -c
      - autovacuum_vacuum_scale_factor=0.01
      - -c
      - autovacuum_analyze_scale_factor=0.01
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nocobase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocobase"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 192M
        reservations:
          memory: 48M
    secrets:
      - db_password
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export REDIS_PASS="$$(cat /run/secrets/redis_password)"
        redis-server --appendonly yes --maxmemory-policy allkeys-lru --maxmemory 50mb --requirepass "$${REDIS_PASS}"
    volumes:
      - redis-data:/data
    networks:
      - nocobase
    healthcheck:
      test: ["CMD", "sh", "-c", "export PASS=\"$$(cat /run/secrets/redis_password)\"; redis-cli -a \"$${PASS}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          memory: 24M
    secrets:
      - redis_password

  app:
    image: nocobase/nocobase:2.1.19
    restart: unless-stopped
    env_file: ./env/app.env
    entrypoint: ["/bin/sh", "/opt/noco-base/entrypoint-wrapper.sh"]
    volumes:
      - ./storage:/app/nocobase/storage
      - ./dashboard:/app/nocobase/storage/dashboard:ro
      - ./nocobase-plugin-dashboard-home:/app/nocobase/node_modules/@nocobase/plugin-dashboard-home:ro
      - ./nocobase-plugin-print-template:/app/nocobase/node_modules/@nocobase/plugin-print-template:ro
      - ./entrypoint-wrapper.sh:/opt/noco-base/entrypoint-wrapper.sh:ro
    networks:
      - nocobase
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/nocobase/storage/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.0G
        reservations:
          memory: 256M
    secrets:
      - app_key
      - db_password
      - redis_password
    environment:
      - APP_KEY_FILE=/run/secrets/app_key
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password

  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./acme-challenge:/var/www/acme:ro
      - ./dashboard:/usr/share/nginx/html/dashboard:ro
      - ./storage:/opt/noco-base/storage:ro

    ports:
      - "80:80"
      - "668:443"
    networks:
      - nocobase
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M

networks:
  nocobase:

volumes:
  postgres-data:
  redis-data:

secrets:
  app_key:
    file: ./secrets/app_key.txt
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt