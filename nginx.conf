limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

# Admin page cache (5s TTL)
proxy_cache_path /var/cache/nginx/admin levels=1:2 keys_zone=admin_cache:10m max_size=100m inactive=60m;

server {
    listen 80;
    server_name voadge.top www.voadge.top;
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }
    location / {
        return 301 https://$host:668$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name voadge.top www.voadge.top;

    ssl_certificate /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/voadge.top.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self)" always;

    client_max_body_size 100M;
    client_body_timeout 120s;

    gzip on;
    gzip_comp_level 6;
    gzip_static on;
    sendfile on;
    tcp_nopush on;
    gzip_buffers 16 8k;
    gzip_types application/json application/javascript text/javascript text/css text/plain
               application/xml text/xml application/wasm application/octet-stream;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;

    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Briefing �?no long cache (frequent updates)
    location = /dashboard/briefing.html {
        root /usr/share/nginx/html;
        etag on;
        add_header Cache-Control "no-cache";
    }

    # Dashboard static files
    # Dashboard static assets (hash-named) - cache 7d
    location /dashboard/assets/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        access_log off;
        autoindex off;
        limit_except GET { deny all; }
    }

    # Dashboard library files - cache 7d
    location /dashboard/lib/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        access_log off;
        autoindex off;
        limit_except GET { deny all; }
    }

    # General dashboard resources - cache 1d
    location /dashboard/ {
        root /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        access_log off;
        autoindex off;
        limit_except GET { deny all; }
    }

    # Dashboard index page
    location = / {
        root /usr/share/nginx/html;
        try_files /dashboard/index.html =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # NocoBase login page - proxied to app, never cache
    location = /signin {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        add_header Cache-Control "no-store, must-revalidate";
        sub_filter '</head>' '</head><script src="/dashboard/assets/auth-sync.js"></script>';
        sub_filter '</body>' '</body><script>(function() {
  "use strict";
  if (!("ontouchstart" in window || navigator.maxTouchPoints > 0)) return;
