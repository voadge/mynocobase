limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_strict:10m rate=10r/s;

server {
    listen 80;
    server_name voadge.top www.voadge.top;
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host:668$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name voadge.top www.voadge.top;

    ssl_certificate /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/voadge.top.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self)" always;

    client_max_body_size 100M;
    client_body_timeout 120s;

    # Internal auth-check endpoint for nginx auth_request
    # Proxies to the plugin's cookie-aware auth:check — reads nb_token cookie
    location /api/plugin-dashboard-home/auth-check {
        internal;
        proxy_pass http://app:13000/api/__auth_check__;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    # Redirect when unauthenticated
    location @login {
        return 302 $scheme://$http_host/signin;
    }

    # Signin - bypass auth
    location = /signin {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '</head><script src="/dashboard/assets/auth-sync.js"></script>';
        sub_filter_once off;
    }

    # Static assets - bypass auth
    location /assets/ {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static plugins - bypass auth
    location /static/ {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Browser checker - bypass auth
    location = /browser-checker.js {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /dashboard/ assets - bypass auth, long cache
    location /dashboard/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        autoindex off;
        limit_except GET { deny all; }
    }

    # /home - protected, serves dashboard
    location /home {
        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:13000/api/__dh__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /geofence - protected, serves geofence manager
    location /geofence {
        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:13000/api/__gf__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /peopledynamic - protected
    location /peopledynamic {
        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:13000/api/__pd__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # /api/mcp - bypass auth (MCP)
    location /api/mcp {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # /api/ paths - bypass auth (includes login, auth endpoints, etc.)
    location /api/ {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        client_max_body_size 100M;
    }

    # Admin pages - via iframe from dashboard
    location /admin/ {
        valid_referers server_names;
        if ($invalid_referer) {
            return 302 $scheme://$http_host/;
        }

        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        sub_filter '</head>' '</head><script src="/dashboard/assets/auth-sync.js"></script>';
        sub_filter '</body>' '<a id="nb-back-btn" href="/dashboard/">← 返回看板</a><style>#nb-back-btn{all:unset;position:fixed;left:12px;bottom:24px;z-index:99999;display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:20px;background:rgba(0,0,0,0.7);color:#e0e6ed;font-size:13px;backdrop-filter:blur(6px);box-shadow:0 2px 12px rgba(0,0,0,0.3);cursor:pointer;text-decoration:none;border:1px solid rgba(255,255,255,0.08);font-family:-apple-system,sans-serif}@media(min-width:768px){#nb-back-btn{display:none!important}}</style><script>if(window.self!==window.top){var b=document.getElementById("nb-back-btn");if(b)b.style.display="none"}</script></body>';
        sub_filter_once off;
    }

    # root - exact match
    location = / {
        # dashboard served directly
        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:13000/api/__dh__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # / - catch-all (protected by auth_request)
    location / {
        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        limit_req zone=api burst=50 nodelay;
        sub_filter '</head>' '</head><script src="/dashboard/assets/auth-sync.js"></script>';
        sub_filter '</body>' '<a id="nb-back-btn" href="/dashboard/">← 返回看板</a><style>#nb-back-btn{all:unset;position:fixed;left:12px;bottom:24px;z-index:99999;display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:20px;background:rgba(0,0,0,0.7);color:#e0e6ed;font-size:13px;backdrop-filter:blur(6px);box-shadow:0 2px 12px rgba(0,0,0,0.3);cursor:pointer;text-decoration:none;border:1px solid rgba(255,255,255,0.08);font-family:-apple-system,sans-serif}@media(min-width:768px){#nb-back-btn{display:none!important}}</style><script>if(window.self!==window.top){var b=document.getElementById("nb-back-btn");if(b)b.style.display="none"}</script></body>';
        sub_filter_once off;
    }
}
