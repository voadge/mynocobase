limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name voadge.top www.voadge.top;
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host:668$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name voadge.top www.voadge.top;

    ssl_certificate /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/voadge.top.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self)" always;

    client_max_body_size 100M;
    client_body_timeout 120s;

    # Internal auth-check endpoint for nginx auth_request
    location /api/plugin-dashboard-home/auth-check {
        internal;
        proxy_pass http://app:13000;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    # Redirect when unauthenticated
    location @login {
        return 302 $scheme://$http_host/signin;
    }

    # Signin - bypass auth
    location = /signin {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter '</head>' '</head><script>(function(){try{var u=new URL(window.location.href);if(u.searchParams.has("redirect")){u.searchParams.delete("redirect");window.history.replaceState({},"",u.toString())}}catch(e){}var a=window.fetch;window.fetch=function(){return a.apply(this,arguments).then(function(r){if(!r.url||r.url.indexOf("/api/auth:signIn")==-1)return r;r.clone().json().then(function(d){var t=d&&d.data&&d.data.token;if(t){document.cookie="nb_token="+t+";path=/;max-age=86400;SameSite=Lax;Secure";window.location.replace("/")}}).catch(function(){});return new Promise(function(){})})};var b=XMLHttpRequest.prototype,c=b.open;b.open=function(m,u){return this._u=u,c.apply(this,arguments)};var d=b.send;b.send=function(){var e=this,f=e.onload;e.onload=function(){if(e._u&&e._u.indexOf("/api/auth:signIn")>-1)try{var g=JSON.parse(e.responseText),h=g&&g.data&&g.data.token;if(h){document.cookie="nb_token="+h+";path=/;max-age=86400;SameSite=Lax;Secure";window.location.replace("/");return}}catch(i){}f&&f.apply(e,arguments)};return d.apply(this,arguments)};setInterval(function(){if(document.cookie.indexOf("nb_token=")>-1){return;}["NOCOBASE_TOKEN","nocobase_token","token","auth_token","access_token"].forEach(function(k){try{var v=localStorage.getItem(k);v&&v.length>20&&(document.cookie="nb_token="+v+";path=/;max-age=86400;SameSite=Lax;Secure")&&window.location.replace("/")}catch(w){}})},500)})();</script>';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    # Static assets - bypass auth
    location /assets/ {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static plugins - bypass auth
    location /static/ {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Browser checker - bypass auth
    location = /browser-checker.js {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /dashboard/ assets - bypass auth
    location /dashboard/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        autoindex off;
    }

    # /dashboard-dev/ staging - bypass auth
    location /dashboard-dev/ {
        root /usr/share/nginx/html;
        expires 5m;
        add_header Cache-Control "no-cache";
        access_log on;
        autoindex off;
    }

    # /home - protected, serves dashboard
    location /home {
        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:13000/api/__dh__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /geofence - protected, serves geofence manager
    location /geofence {
        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:13000/api/__gf__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # /api/mcp - bypass auth (MCP)
    location /api/mcp {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # /api/ paths - bypass auth (includes login, auth endpoints, etc.)
    location /api/ {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        client_max_body_size 100M;
    }

    # Admin pages - only from dashboard (via iframe links)
    location /admin/ {
        valid_referers server_names;
        if ($invalid_referer) {
            return 302 $scheme://$http_host/;
        }

        auth_request /api/plugin-dashboard-home/auth-check;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @login;

        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
