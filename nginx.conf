})();</script>';   sub_filter_once off;
    }

    # Geofence manager page
    location /geofence {
        proxy_pass http://app:13000/api/__gf__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # People dynamic page
    location /peopledynamic {
        proxy_pass http://app:13000/api/__pd__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # Road patrol API proxy (bypass CORS for external service)
    location /api/road-proxy/ {
        proxy_pass https://road.xiangsu.work/;
        proxy_http_version 1.1;
        proxy_set_header Host road.xiangsu.work;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        add_header Access-Control-Allow-Origin 'https://voadge.top:668' always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin 'https://voadge.top:668' always;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers '*' always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # AI plugin stubs - return empty data (plugin disabled but client code still calls)
    location = /api/aiEmployees:listByUser {
        return 200 '{"data":[]}';
    }
    location = /api/aiConversations:unreadCounts {
        return 200 '{"data":{"unreadCount":0}}';
    }
    location = /api/aiSettings:publicGet {
        return 200 '{"data":{}}';
    }

    # Print Template plugin - clean URL and internal routes
    location /print-template {
        rewrite ^/print-template$ /api/__pt__/admin last;
        rewrite ^/print-template/(.*) /api/__pt__/admin/$1 last;
    }
    location ^~ /__pt__/ {
        rewrite ^/__pt__/(.*)$ /api/__pt__/$1 last;
    }

    # API - all proxied to app (Bearer token auth handled by NocoBase)
    location /api/ {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        client_max_body_size 100M;
    }

    # App static assets (hash-named, e.g. .js .css .png) �?proxy passthrough, long cache
    location /assets/ {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static plugin files (hash-named) - cache 7d immutable
    location /static/ {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Admin static assets (hash-named) - long cache
    location ~ ^/admin/assets/.*\.(js|css|png|jpg|svg|woff2|ico)$ {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Admin panel - proxied to NocoBase app, short-lived cache (30s)
    location /admin/ {
        proxy_cache admin_cache;
        proxy_cache_key "$scheme$host$request_uri";
        proxy_cache_valid 200 302 30s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_background_update on;

        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        add_header Cache-Control "no-store, must-revalidate";
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        sub_filter '</head>' '</head><script src="/dashboard/assets/auth-sync.js"></script>';
