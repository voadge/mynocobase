    # Attachments - serve directly from storage, bypass app container
    location /storage/uploads/ {
        alias /opt/noco-base/storage/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        autoindex off;
        limit_except GET { deny all; }

        location ~* \.(html|htm|svg|svgz|xhtml)$ {
            add_header Content-Disposition "attachment" always;
        }
        location ~* \.md$ {
            default_type text/markdown;
            add_header Content-Disposition "inline";
        }
        location ~* \.mp4$ {
            mp4;
            mp4_start_key_frame on;
            mp4_buffer_size 1M;
            mp4_max_buffer_size 10M;
            limit_rate_after 1M;
            limit_rate 10M;
        }
        location ~* \.(pdf|zip|docx?|xlsx?)$ {
            add_header Content-Disposition "attachment" always;
        }
    }

    # Everything else - proxied to NocoBase app, never cache
    location / {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        add_header Cache-Control "no-store, must-revalidate";
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        limit_req zone=api burst=50 nodelay;
