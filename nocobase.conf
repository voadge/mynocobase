limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

# Admin page cache (5s TTL) — HTML is pure SPA Shell, same for all users
proxy_cache_path /var/cache/nginx/admin levels=1:2 keys_zone=admin_cache:10m max_size=100m inactive=60m;

server {
    listen 80;
    server_name voadge.top www.voadge.top;
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }
    location / {
        return 301 https://$host:668$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name voadge.top www.voadge.top;

    ssl_certificate /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/voadge.top.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self)" always;

    client_max_body_size 100M;
    client_body_timeout 120s;

    # Briefing — no long cache (frequent updates)
    location = /dashboard/briefing.html {
        root /usr/share/nginx/html;
        etag on;
        add_header Cache-Control "no-cache";
    }

    # Dashboard static files
    location /dashboard/assets/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        access_log off;
        autoindex off;
        limit_except GET { deny all; }
    }

    # Dashboard library files
    location /dashboard/lib/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        access_log off;
        autoindex off;
        limit_except GET { deny all; }
    }

    # General dashboard resources
    location /dashboard/ {
        root /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        access_log off;
    }

    # NocoBase root
    location = / {
        root /usr/share/nginx/html;
        try_files /dashboard/index.html =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Sign-in redirect
    location = /signin {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Geofence plugin
    location /geofence {
        proxy_pass http://app:13000/api/__gf__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # People dynamic plugin
    location /peopledynamic {
        proxy_pass http://app:13000/api/__pd__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # Road proxy
    location /api/road-proxy/ {
        proxy_pass https://road.xiangsu.work/;
        proxy_http_version 1.1;
        proxy_set_header Host road.xiangsu.work;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI stubs
    location = /api/aiEmployees:listByUser {
        return 200 '{"data":[]}';
    }
    location = /api/aiConversations:unreadCounts {
        return 200 '{"data":{"unreadCount":0}}';
    }
    location = /api/aiSettings:publicGet {
        return 200 '{"data":{}}';
    }

    # API
    location /api/ {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Static files
    location /static/ {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Admin panel - proxied to NocoBase app, short-lived cache (5s)
    location /admin/ {
        proxy_cache admin_cache;
        proxy_cache_key "$scheme$host$request_uri";
        proxy_cache_valid 200 302 5s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_background_update on;

        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Print Template plugin - clean URL and internal routes
    location /print-template {
        rewrite ^/print-template$ /api/__pt__/admin last;
        rewrite ^/print-template/(.*) /api/__pt__/admin/$1 last;
    }
    location ^~ /__pt__/ {
        rewrite ^/__pt__/(.*)$ /api/__pt__/$1 last;
    }


    # Everything else - proxied to NocoBase app
    location / {
        proxy_pass http://app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        limit_req zone=api burst=50 nodelay;
    }
}
